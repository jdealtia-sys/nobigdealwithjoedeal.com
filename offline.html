<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBD Pro — You're Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#fff;font-family:'Montserrat',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#161b22;border:1px solid rgba(232,114,12,.25);border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:100%}
.icon{font-size:3.5rem;margin-bottom:20px;display:block}
.badge{display:inline-flex;align-items:center;gap:8px;background:#e8720c;color:#fff;font-size:.7rem;font-weight:800;letter-spacing:.15em;text-transform:uppercase;padding:5px 14px;border-radius:4px;margin-bottom:20px}
h1{font-size:1.6rem;font-weight:800;letter-spacing:.02em;margin-bottom:10px}
h1 span{color:#e8720c}
p{color:rgba(255,255,255,.55);font-size:.87rem;line-height:1.7;margin-bottom:28px}
.tip{background:rgba(232,114,12,.07);border:1px solid rgba(232,114,12,.2);border-radius:8px;padding:14px 16px;font-size:.8rem;color:rgba(255,255,255,.6);line-height:1.6;margin-bottom:28px;text-align:left}
.tip strong{color:#f59240;display:block;margin-bottom:4px}
.btn{display:inline-block;background:#e8720c;color:#fff;padding:13px 28px;border-radius:6px;font-weight:800;font-size:.82rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;font-family:inherit}
.btn:hover{background:#c45e08}
</style>
</head>
<body>
<div class="card">
  <span class="icon">&#9889;</span>
  <div class="badge">NBD Pro</div>
  <h1>You're <span>Offline</span></h1>
  <p>No connection detected. The app saves your data locally so nothing is lost. Get back online to sync your leads, streaks, and pipeline.</p>
  <div class="tip">
    <strong>While you wait:</strong>
    Your daily success entries and actions are saved locally and will auto-sync the moment your connection returns.
  </div>
  <button class="btn" onclick="window.location.reload()">Try Again</button>
</div>
</body>
</html>
