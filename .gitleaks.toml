# NBD Pro — gitleaks configuration
#
# Suppresses known-public strings in the web client. Server-side
# code (functions/, scripts/) is NEVER exempted; the legacy grep
# secret-scan step in .github/workflows/ci.yml provides a second
# layer of defense on docs/.

[extend]
useDefault = true

# Single `[allowlist]` (not `[[allowlists]]`) — compatible across
# all gitleaks v8.x versions. `[[allowlists]]` is v8.18+ only and
# the gitleaks-action@v2 pin doesn't guarantee that, which is why
# the first push flagged `gcp-api-key` on docs/admin/js/pages/mfa-enroll.js:21
# despite having the allowlist in place.
[allowlist]
description = "NBD Pro allowlist — known-public client material + placeholders"

# Paths exempted from ALL rules:
# Tests carry synthetic fixtures only. _archive/** is quarantined.
# We INTENTIONALLY no longer blanket-allowlist docs/** — a real Stripe
# live secret or Anthropic key in a debug file under docs/ should fail
# CI. Instead we exempt the specific regex patterns that are documented
# as public (Firebase web API keys, Stripe publishable keys) below.
paths = [
    '''^tests/''',
    '''.*/_archive/.*''',
]

# Content regexes exempted globally — match against the secret body.
# These patterns are PUBLIC by design or placeholders in setup
# instructions; real server secrets never take these shapes.
regexTarget = "match"
regexes = [
    '''AIza[0-9A-Za-z_-]{35}''',    # Firebase Web API key (domain-restricted, public)
    '''pk_live_[0-9A-Za-z]{20,}''', # Stripe publishable key (public by design)
    '''pk_test_[0-9A-Za-z]{20,}''', # Stripe test publishable key
    '''sk-ant-\.{3,}''',            # sk-ant-... placeholder
    '''sk_live_\.{3,}''',           # sk_live_... placeholder
    '''paste your sk[_-]''',        # "paste your sk_..." instructions
    '''6L[0-9A-Za-z_-]{38}''',      # reCAPTCHA v3 site key (origin-bound, public — see docs/deploy/03-app-check.md)
]
