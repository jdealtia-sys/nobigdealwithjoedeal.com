# NBD Pro — gitleaks configuration
#
# Suppresses known-public strings in the web client. Server-side
# code (functions/, scripts/) is NEVER exempted; the legacy grep
# secret-scan step in .github/workflows/ci.yml provides a second
# layer of defense on docs/.

[extend]
useDefault = true

# Single `[allowlist]` (not `[[allowlists]]`) — compatible across
# all gitleaks v8.x versions. `[[allowlists]]` is v8.18+ only and
# the gitleaks-action@v2 pin doesn't guarantee that, which is why
# the first push flagged `gcp-api-key` on docs/admin/js/pages/mfa-enroll.js:21
# despite having the allowlist in place.
[allowlist]
description = "NBD Pro allowlist — client-side public material + test fixtures"

# Paths exempted from ALL rules:
#
# - docs/**/*.js + docs/**/*.html are the public web client. Firebase
#   Web API keys (AIza*) are domain-restricted, not secrets. Stripe
#   publishable keys (pk_live_*) are public. Any real server secret
#   that reached the client would be visible in devtools anyway, so
#   defense-in-depth lives in the grep secret-scan job (still runs
#   on these paths via the CI workflow) and the server-side
#   defineSecret() discipline in functions/.
# - tests/** never contains real secrets; synthetic fixtures only.
# - _archive/** is quarantined legacy code awaiting deletion.
paths = [
    '''^docs/.*\.html$''',
    '''^docs/.*\.js$''',
    '''^tests/''',
    '''.*/_archive/.*''',
]

# Content regexes exempted globally — match against the secret body.
# These patterns are PLACEHOLDERS used in setup instructions; real
# secrets never take this shape.
regexTarget = "match"
regexes = [
    '''sk-ant-\.{3,}''',            # sk-ant-... placeholder
    '''sk_live_\.{3,}''',           # sk_live_... placeholder
    '''paste your sk[_-]''',        # "paste your sk_..." instructions
]
