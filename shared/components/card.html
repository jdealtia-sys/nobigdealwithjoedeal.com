<!-- NBD Platform — Card Component Template -->

<!-- 
  USAGE EXAMPLES:
  
  1. Service Card:
  nbdCreateCard({
    type: 'service',
    title: 'Roofing',
    description: 'Professional roof installation and repair',
    image: '/brand/assets/images/roofing.jpg',
    link: '/brand/services/roofing.html'
  })
  
  2. Blog Card:
  nbdCreateCard({
    type: 'blog',
    title: 'Why Most Roofing Estimates Are Inflated',
    description: 'The truth about contractor pricing...',
    author: 'Joe Deal',
    date: '2025-04-01',
    tags: ['roofing', 'pricing'],
    link: '/brand/blog/inflated-estimates.html'
  })
  
  3. Customer Card:
  nbdCreateCard({
    type: 'customer',
    name: 'John Smith',
    email: 'john@example.com',
    phone: '(513) 555-1234',
    serviceType: 'roof',
    status: 'new',
    onclick: 'viewCustomer("customer_id")'
  })
  
  4. Lead Card:
  nbdCreateCard({
    type: 'lead',
    name: 'Jane Doe',
    source: 'ai_visualizer',
    serviceType: 'siding',
    status: 'contacted',
    createdAt: timestamp,
    onclick: 'viewLead("lead_id")'
  })
-->

<script>
function nbdCreateCard(options) {
  const {
    type = 'default',
    title = '',
    description = '',
    image = '',
    link = '',
    author = '',
    date = null,
    tags = [],
    name = '',
    email = '',
    phone = '',
    serviceType = '',
    status = '',
    source = '',
    createdAt = null,
    onclick = ''
  } = options;
  
  // Service card
  if (type === 'service') {
    return `
      <div class="nbd-card nbd-card-service" ${onclick ? `onclick="${onclick}"` : ''} ${onclick ? 'style="cursor: pointer;"' : ''}>
        ${image ? `<img src="${image}" alt="${title}" class="nbd-card-image">` : ''}
        <div class="nbd-card-body">
          <h3 class="nbd-card-title">${title}</h3>
          <p class="nbd-card-description">${description}</p>
          ${link ? `<a href="${link}" class="nbd-card-link">Learn More →</a>` : ''}
        </div>
      </div>
    `;
  }
  
  // Blog card
  if (type === 'blog') {
    return `
      <div class="nbd-card nbd-card-blog" ${onclick ? `onclick="${onclick}"` : ''} ${onclick ? 'style="cursor: pointer;"' : ''}>
        ${image ? `<img src="${image}" alt="${title}" class="nbd-card-image">` : ''}
        <div class="nbd-card-body">
          ${tags.length > 0 ? `
            <div class="nbd-card-tags">
              ${tags.map(tag => `<span class="nbd-tag">${tag}</span>`).join('')}
            </div>
          ` : ''}
          <h3 class="nbd-card-title">${title}</h3>
          <p class="nbd-card-description">${description}</p>
          <div class="nbd-card-meta">
            ${author ? `<span class="nbd-card-author">By ${author}</span>` : ''}
            ${date ? `<span class="nbd-card-date">${nbdFormatDate(date)}</span>` : ''}
          </div>
          ${link ? `<a href="${link}" class="nbd-card-link">Read More →</a>` : ''}
        </div>
      </div>
    `;
  }
  
  // Customer card
  if (type === 'customer') {
    return `
      <div class="nbd-card nbd-card-customer" ${onclick ? `onclick="${onclick}"` : ''} ${onclick ? 'style="cursor: pointer;"' : ''}>
        <div class="nbd-card-header">
          <h3 class="nbd-card-title">${name}</h3>
          ${status ? `<span class="nbd-badge nbd-badge-${status}">${nbdGetStatusLabel(status)}</span>` : ''}
        </div>
        <div class="nbd-card-body">
          ${email ? `
            <div class="nbd-card-info">
              <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4Zm2-1a1 1 0 0 0-1 1v.217l7 4.2 7-4.2V4a1 1 0 0 0-1-1H2Zm13 2.383-4.708 2.825L15 11.105V5.383Zm-.034 6.876-5.64-3.471L8 9.583l-1.326-.795-5.64 3.47A1 1 0 0 0 2 13h12a1 1 0 0 0 .966-.741ZM1 11.105l4.708-2.897L1 5.383v5.722Z"/>
              </svg>
              <span>${email}</span>
            </div>
          ` : ''}
          ${phone ? `
            <div class="nbd-card-info">
              <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M3.654 1.328a.678.678 0 0 0-1.015-.063L1.605 2.3c-.483.484-.661 1.169-.45 1.77a17.568 17.568 0 0 0 4.168 6.608 17.569 17.569 0 0 0 6.608 4.168c.601.211 1.286.033 1.77-.45l1.034-1.034a.678.678 0 0 0-.063-1.015l-2.307-1.794a.678.678 0 0 0-.58-.122l-2.19.547a1.745 1.745 0 0 1-1.657-.459L5.482 8.062a1.745 1.745 0 0 1-.46-1.657l.548-2.19a.678.678 0 0 0-.122-.58L3.654 1.328z"/>
              </svg>
              <span>${nbdFormatPhone(phone)}</span>
            </div>
          ` : ''}
          ${serviceType ? `
            <div class="nbd-card-info">
              <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5 8.186 1.113zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"/>
              </svg>
              <span>${nbdCapitalize(serviceType)}</span>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }
  
  // Lead card
  if (type === 'lead') {
    return `
      <div class="nbd-card nbd-card-lead" ${onclick ? `onclick="${onclick}"` : ''} ${onclick ? 'style="cursor: pointer;"' : ''}>
        <div class="nbd-card-header">
          <div>
            <h3 class="nbd-card-title">${name}</h3>
            ${source ? `<span class="nbd-card-source">${nbdCapitalize(source.replace('_', ' '))}</span>` : ''}
          </div>
          ${status ? `<span class="nbd-badge nbd-badge-${status}">${nbdGetStatusLabel(status)}</span>` : ''}
        </div>
        <div class="nbd-card-body">
          ${serviceType ? `
            <div class="nbd-card-info">
              <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8.186 1.113a.5.5 0 0 0-.372 0L1.846 3.5 8 5.961 14.154 3.5 8.186 1.113zM15 4.239l-6.5 2.6v7.922l6.5-2.6V4.24zM7.5 14.762V6.838L1 4.239v7.923l6.5 2.6zM7.443.184a1.5 1.5 0 0 1 1.114 0l7.129 2.852A.5.5 0 0 1 16 3.5v8.662a1 1 0 0 1-.629.928l-7.185 2.874a.5.5 0 0 1-.372 0L.63 13.09a1 1 0 0 1-.63-.928V3.5a.5.5 0 0 1 .314-.464L7.443.184z"/>
              </svg>
              <span>${nbdCapitalize(serviceType)}</span>
            </div>
          ` : ''}
          ${createdAt ? `
            <div class="nbd-card-info">
              <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                <path d="M8 3.5a.5.5 0 0 0-1 0V9a.5.5 0 0 0 .252.434l3.5 2a.5.5 0 0 0 .496-.868L8 8.71V3.5z"/>
                <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm7-8A7 7 0 1 1 1 8a7 7 0 0 1 14 0z"/>
              </svg>
              <span>${nbdTimeAgo(createdAt)}</span>
            </div>
          ` : ''}
        </div>
      </div>
    `;
  }
  
  // Default card
  return `
    <div class="nbd-card" ${onclick ? `onclick="${onclick}"` : ''} ${onclick ? 'style="cursor: pointer;"' : ''}>
      ${image ? `<img src="${image}" alt="${title}" class="nbd-card-image">` : ''}
      <div class="nbd-card-body">
        ${title ? `<h3 class="nbd-card-title">${title}</h3>` : ''}
        ${description ? `<p class="nbd-card-description">${description}</p>` : ''}
        ${link ? `<a href="${link}" class="nbd-card-link">Learn More →</a>` : ''}
      </div>
    </div>
  `;
}

// Expose to window scope
window.nbdCreateCard = nbdCreateCard;
</script>

<style>
/* Card base styles */
.nbd-card-image {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
}

.nbd-card-title {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--text-primary);
  margin: 0 0 var(--space-sm);
}

.nbd-card-description {
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin: 0 0 var(--space-md);
  line-height: 1.6;
}

.nbd-card-link {
  display: inline-flex;
  align-items: center;
  gap: var(--space-xs);
  font-weight: 600;
  color: var(--primary);
  text-decoration: none;
  transition: color var(--transition-fast);
}

.nbd-card-link:hover {
  color: var(--secondary);
}

/* Blog card specific */
.nbd-card-tags {
  display: flex;
  gap: var(--space-sm);
  margin-bottom: var(--space-sm);
  flex-wrap: wrap;
}

.nbd-tag {
  display: inline-block;
  padding: var(--space-xs) var(--space-sm);
  font-size: 0.75rem;
  font-weight: 600;
  background-color: var(--bg-tertiary);
  color: var(--text-secondary);
  border-radius: var(--radius-full);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.nbd-card-meta {
  display: flex;
  gap: var(--space-md);
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-top: var(--space-md);
  padding-top: var(--space-md);
  border-top: 1px solid var(--border-light);
}

.nbd-card-author,
.nbd-card-date {
  display: flex;
  align-items: center;
  gap: var(--space-xs);
}

/* Customer/Lead card specific */
.nbd-card-info {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  font-size: 0.875rem;
  color: var(--text-secondary);
  margin-bottom: var(--space-sm);
}

.nbd-card-info svg {
  flex-shrink: 0;
  opacity: 0.6;
}

.nbd-card-source {
  font-size: 0.75rem;
  color: var(--text-secondary);
  text-transform: capitalize;
}
</style>
