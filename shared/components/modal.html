<!-- NBD Platform — Modal Component -->

<!--
  USAGE EXAMPLES:
  
  1. Simple confirmation:
  nbdShowModal({
    title: 'Confirm Delete',
    body: 'Are you sure you want to delete this customer?',
    confirmText: 'Delete',
    cancelText: 'Cancel',
    onConfirm: () => { deleteCustomer(id); }
  });
  
  2. Form modal:
  nbdShowModal({
    title: 'Add New Lead',
    body: `
      <form id="leadForm">
        <div class="nbd-form-group">
          <label class="nbd-label">Name</label>
          <input type="text" class="nbd-input" id="leadName" required>
        </div>
        ...
      </form>
    `,
    confirmText: 'Create Lead',
    onConfirm: () => { submitLeadForm(); }
  });
  
  3. Info modal (no confirm):
  nbdShowModal({
    title: 'Welcome!',
    body: 'Thanks for using NBD Pro.',
    showCancel: false
  });
-->

<div class="nbd-modal-overlay" id="nbdModalOverlay">
  <div class="nbd-modal">
    <div class="nbd-modal-header">
      <h2 class="nbd-modal-title" id="nbdModalTitle">Modal Title</h2>
      <button class="nbd-modal-close" onclick="nbdHideModal()" aria-label="Close">
        ×
      </button>
    </div>
    <div class="nbd-modal-body" id="nbdModalBody">
      Modal content goes here
    </div>
    <div class="nbd-modal-footer" id="nbdModalFooter">
      <button class="nbd-btn nbd-btn-outline" onclick="nbdHideModal()" id="nbdModalCancel">
        Cancel
      </button>
      <button class="nbd-btn nbd-btn-primary" onclick="nbdModalConfirm()" id="nbdModalConfirm">
        Confirm
      </button>
    </div>
  </div>
</div>

<script>
let nbdModalConfirmCallback = null;

function nbdShowModal(options) {
  const {
    title = 'Confirm',
    body = '',
    confirmText = 'Confirm',
    cancelText = 'Cancel',
    showCancel = true,
    showConfirm = true,
    onConfirm = null,
    size = 'medium' // small, medium, large
  } = options;
  
  // Set content
  document.getElementById('nbdModalTitle').textContent = title;
  document.getElementById('nbdModalBody').innerHTML = body;
  document.getElementById('nbdModalConfirm').textContent = confirmText;
  document.getElementById('nbdModalCancel').textContent = cancelText;
  
  // Show/hide buttons
  document.getElementById('nbdModalCancel').style.display = showCancel ? 'inline-flex' : 'none';
  document.getElementById('nbdModalConfirm').style.display = showConfirm ? 'inline-flex' : 'none';
  
  // Set size
  const modal = document.querySelector('.nbd-modal');
  modal.className = 'nbd-modal';
  if (size === 'small') modal.classList.add('nbd-modal-small');
  if (size === 'large') modal.classList.add('nbd-modal-large');
  
  // Store callback
  nbdModalConfirmCallback = onConfirm;
  
  // Show modal
  const overlay = document.getElementById('nbdModalOverlay');
  overlay.style.display = 'flex';
  setTimeout(() => {
    overlay.classList.add('active');
  }, 10);
  
  // Prevent body scroll
  document.body.style.overflow = 'hidden';
}

function nbdHideModal() {
  const overlay = document.getElementById('nbdModalOverlay');
  overlay.classList.remove('active');
  
  setTimeout(() => {
    overlay.style.display = 'none';
    document.body.style.overflow = '';
    nbdModalConfirmCallback = null;
  }, 300);
}

function nbdModalConfirm() {
  if (nbdModalConfirmCallback && typeof nbdModalConfirmCallback === 'function') {
    nbdModalConfirmCallback();
  }
  nbdHideModal();
}

// Close modal on overlay click
document.addEventListener('DOMContentLoaded', () => {
  const overlay = document.getElementById('nbdModalOverlay');
  if (overlay) {
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        nbdHideModal();
      }
    });
  }
});

// Close modal on Escape key
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    const overlay = document.getElementById('nbdModalOverlay');
    if (overlay && overlay.classList.contains('active')) {
      nbdHideModal();
    }
  }
});

// Expose to window scope
window.nbdShowModal = nbdShowModal;
window.nbdHideModal = nbdHideModal;
window.nbdModalConfirm = nbdModalConfirm;
</script>

<style>
/* Ensure modal overlay exists but is hidden by default */
.nbd-modal-overlay {
  display: none;
}

/* Modal size variants */
.nbd-modal-small {
  max-width: 400px;
}

.nbd-modal-large {
  max-width: 900px;
}

/* Form styles inside modals */
.nbd-modal-body .nbd-form-group:last-child {
  margin-bottom: 0;
}
</style>
