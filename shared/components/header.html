<style>
.nbd-header {
  background-color: var(--bg-primary);
  border-bottom: 1px solid var(--border-light);
  box-shadow: var(--shadow-sm);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nbd-header-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: var(--space-md) var(--space-lg);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--space-lg);
}

.nbd-header-logo {
  flex-shrink: 0;
}

.nbd-logo-link {
  display: flex;
  align-items: center;
  gap: var(--space-sm);
  text-decoration: none;
  color: var(--text-primary);
}

.nbd-logo-img {
  height: 40px;
  width: auto;
}

.nbd-logo-text {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--primary);
}

.nbd-header-nav {
  display: flex;
  gap: var(--space-lg);
  align-items: center;
}

.nbd-nav-link {
  font-weight: 600;
  color: var(--text-primary);
  text-decoration: none;
  transition: color var(--transition-fast);
  position: relative;
}

.nbd-nav-link:hover {
  color: var(--secondary);
}

.nbd-nav-link::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 2px;
  background-color: var(--secondary);
  transition: width var(--transition-fast);
}

.nbd-nav-link:hover::after {
  width: 100%;
}

.nbd-nav-highlight {
  color: var(--secondary);
  font-weight: 700;
}

.nbd-header-cta {
  flex-shrink: 0;
}

.nbd-mobile-toggle {
  display: none;
  flex-direction: column;
  gap: 4px;
  background: none;
  border: none;
  cursor: pointer;
  padding: var(--space-sm);
}

.nbd-mobile-toggle span {
  width: 24px;
  height: 3px;
  background-color: var(--text-primary);
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
}

.nbd-mobile-nav {
  display: none;
  flex-direction: column;
  gap: var(--space-sm);
  padding: var(--space-lg);
  border-top: 1px solid var(--border-light);
  background-color: var(--bg-secondary);
}

.nbd-mobile-nav.active {
  display: flex;
}

.nbd-mobile-link {
  padding: var(--space-sm);
  font-weight: 600;
  color: var(--text-primary);
  text-decoration: none;
  transition: all var(--transition-fast);
  border-radius: var(--radius-md);
}

.nbd-mobile-link:hover {
  background-color: var(--bg-tertiary);
  color: var(--secondary);
}

.nbd-mobile-cta {
  background-color: var(--primary);
  color: var(--text-inverse);
  text-align: center;
  margin-top: var(--space-sm);
}

.nbd-mobile-cta:hover {
  background-color: var(--nbd-navy);
  color: var(--text-inverse);
}

@media (max-width: 768px) {
  .nbd-header-nav,
  .nbd-header-cta {
    display: none;
  }
  
  .nbd-mobile-toggle {
    display: flex;
  }
}
</style>

<script>
function nbdToggleMobileMenu() {
  const mobileNav = document.getElementById('nbdMobileNav');
  mobileNav.classList.toggle('active');
}

// Close mobile menu when clicking outside
document.addEventListener('click', (e) => {
  const header = document.getElementById('nbdHeader');
  const mobileNav = document.getElementById('nbdMobileNav');
  
  if (!header.contains(e.target) && mobileNav.classList.contains('active')) {
    mobileNav.classList.remove('active');
  }
});

// Expose to window scope
window.nbdToggleMobileMenu = nbdToggleMobileMenu;
</script>
