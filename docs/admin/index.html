<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- L-01: generic title + no og:url. Firebase Hosting sets
     X-Robots-Tag: noindex,nofollow + Cache-Control: no-store on
     /admin/** (firebase.json:73) so search engines won't crawl
     this page, but scrapers that pull the markup get nothing
     advertising an admin surface. -->
<meta name="robots" content="noindex, nofollow">
<title>NBD Pro</title>
<!-- Site-absolute on purpose: cleanUrls serves this page at /admin (no
     trailing slash), so a relative src resolved to /js/pages/… → 404 and
     the page rendered permanently blank (its body is empty; this script
     IS the page). -->
<script type="module" src="/admin/js/pages/index-redirect.js"></script>
<link rel="stylesheet" href="/assets/css/nbd-mobile.css">
</head>
<body></body>
</html>
