<!DOCTYPE html>
<html lang="en" data-theme="nbd-original" style="visibility:hidden">
<head>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/pro/img/nbd-icon-192.png">
<link rel="stylesheet" href="css/theme-system.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0A0C0F">
  <script src="js/standalone-compat.js"></script>
  <title>Ask Joe — NBD Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    /* Audit #29: shared theme vars now come from css/theme-system.css
       (--bg, --s, --s2, --s3, --br, --t, --m, --orange, --og). The local
       block used to hardcode nbd-original values unconditionally, which
       silently overrode whatever theme the user picked. */
    
    body {
      font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--t);
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }
    
    /* HEADER */
    header {
      background: rgba(10,12,15,.97);
      -webkit-backdrop-filter:blur(20px);backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--br);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--t);
    }
    
    .logo span {
      color: var(--orange);
      font-weight: 400;
    }
    
    .back-btn {
      background: var(--s2);
      border: 1px solid var(--br);
      color: var(--t);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all .15s;
    }
    
    .back-btn:hover {
      background: var(--s3);
      border-color: var(--orange);
    }
    
    /* CHAT CONTAINER */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      overflow: hidden;
    }
    
    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      flex-direction: row-reverse;
    }
    
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .message.user .avatar {
      background: var(--s3);
    }
    
    .bubble {
      background: var(--s2);
      border: 1px solid var(--br);
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 70%;
      line-height: 1.6;
      font-size: 14px;
    }
    
    .message.user .bubble {
      background: var(--og);
      border-color: var(--orange);
    }
    
    .bubble code {
      background: var(--s);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }
    
    /* TYPING INDICATOR */
    .typing {
      display: none;
      gap: 4px;
      padding: 8px 12px;
    }
    
    .typing.active {
      display: flex;
    }
    
    .typing span {
      width: 8px;
      height: 8px;
      background: var(--m);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    /* INPUT AREA */
    .input-area {
      border-top: 1px solid var(--br);
      padding: 20px 0 0;
      flex-shrink: 0;
    }
    
    .input-box {
      display: flex;
      gap: 12px;
      background: var(--s2);
      border: 1px solid var(--br);
      border-radius: 12px;
      padding: 12px;
      transition: border-color .15s;
    }
    
    .input-box:focus-within {
      border-color: var(--orange);
    }
    
    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--t);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
    }
    
    #userInput::placeholder {
      color: var(--m);
    }
    
    #sendBtn {
      background: var(--orange);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    
    #sendBtn:hover:not(:disabled) {
      background: #d65e20;
      transform: scale(1.05);
    }
    
    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* WELCOME MESSAGE */
    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--m);
    }
    
    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .welcome h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      color: var(--t);
      margin-bottom: 8px;
    }
    
    .welcome p {
      font-size: 14px;
      line-height: 1.6;
    }
    
    /* MOBILE */
    @media (max-width: 768px) {
      .chat-container {
        padding: 12px;
      }
      
      .bubble {
        max-width: 85%;
      }
    }
  </style>
  <script type="module" src="js/pages/ask-joe-gate.js"></script>
  <meta property="og:url" content="https://nobigdealwithjoedeal.com/pro/ask-joe">
</head>
<body>

<header>
  <div class="logo"><span style="color:#E8EAF0;">NBD</span> <span style="color:#e8720c;">PRO</span></div>
  <a class="back-btn" href="/pro/dashboard.html" role="button">← Back to Dashboard</a>
</header>

<div class="chat-container">
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Hey! I'm Joe AI</h2>
      <p>Ask me anything about contracting, insurance restoration, Xactimate, or NBD Pro features.<br>I'm here to help!</p>
    </div>
  </div>
  
  <div class="input-area">
    <div class="input-box">
      <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
      <button type="button" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script type="module" src="js/pages/ask-joe-auth.js"></script>

<script src="js/pages/ask-joe-main.js"></script>

</body>
</html>
