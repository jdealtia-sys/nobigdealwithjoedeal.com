<!DOCTYPE html>
<html lang="en" data-theme="nbd-original">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex,nofollow">
  <title>Review &amp; Sign · No Big Deal Home Solutions</title>
  <style>
    :root { --orange:#e8720c; --ink:#1a1a2e; --paper:#f7f8fa; --br:#e2e6ec; --muted:#6b7280; }
    * { box-sizing:border-box; }
    html,body { margin:0; height:100%; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif; background:var(--paper); color:var(--ink); display:flex; flex-direction:column; }
    .sp-bar { background:#fff; border-bottom:1px solid var(--br); padding:12px 16px; display:flex; align-items:center; gap:10px; flex:0 0 auto; }
    .sp-bar .brand { font-weight:800; font-size:15px; }
    .sp-bar .doc { color:var(--muted); font-size:13px; }
    .sp-stage { flex:1 1 auto; position:relative; overflow:hidden; }
    #spFrame { width:100%; height:100%; border:0; background:#fff; display:none; }
    .sp-msg { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; text-align:center; padding:28px; }
    .sp-msg .card { max-width:420px; }
    .sp-msg h2 { margin:0 0 8px; font-size:19px; }
    .sp-msg p { color:var(--muted); font-size:14px; line-height:1.5; }
    .sp-foot { flex:0 0 auto; background:#fff; border-top:1px solid var(--br); padding:14px 16px; display:none; gap:12px; align-items:center; }
    .sp-foot .hint { font-size:12px; color:var(--muted); }
    .sp-btn { margin-left:auto; background:var(--orange); color:#fff; border:0; border-radius:9px; padding:13px 24px; font-size:15px; font-weight:800; cursor:pointer; -webkit-tap-highlight-color:transparent; }
    .sp-btn:disabled { opacity:.55; cursor:default; }
    .spin { width:18px;height:18px;border:2px solid rgba(0,0,0,.15);border-top-color:var(--orange);border-radius:50%;display:inline-block;animation:sp 0.7s linear infinite;vertical-align:middle; }
    @keyframes sp { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="sp-bar">
    <span class="brand">No Big Deal Home Solutions</span>
    <span class="doc" id="spDocName"></span>
  </div>
  <div class="sp-stage">
    <iframe id="spFrame" sandbox="allow-popups allow-popups-to-escape-sandbox allow-forms allow-scripts allow-modals" title="Document to sign"></iframe>
    <div class="sp-msg" id="spMsg">
      <div class="card">
        <div id="spMsgIcon" style="font-size:34px;margin-bottom:10px;"><span class="spin"></span></div>
        <h2 id="spMsgTitle">Loading your document…</h2>
        <p id="spMsgBody">One moment while we get everything ready to sign.</p>
      </div>
    </div>
  </div>
  <div class="sp-foot" id="spFoot">
    <span class="hint">Draw your signature in the box above, then tap Submit.</span>
    <button class="sp-btn" id="spSubmit" type="button">✍️ Submit Signature</button>
  </div>
  <script defer src="js/sign-page.js?v=1"></script>
</body>
</html>
