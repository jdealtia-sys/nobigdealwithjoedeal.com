<!doctype html>
<html lang="en" data-nbd-brand="true">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Your Project · No Big Deal Home Solutions</title>
<link rel="icon" href="/pro/favicon.svg">
<!-- Photo system Phase 1 (2026-05-13): customer-facing surfaces use the
     locked nbd-brand.css token system, not the rep-side theme system.
     The portal always renders in official NBD brand (light base, orange
     accent) regardless of what theme the rep picked for their dashboard
     — that's how every shared link/PDF/portal looks like the same
     company. See docs/pro/css/nbd-brand.css. -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap">
<link rel="stylesheet" href="css/nbd-brand.css">
<style>
  /* Page-local styling — only structural rules. Every color/font/space
     reads from the brand token set. Adding a token would mean editing
     nbd-brand.css; the page itself stays palette-free. */
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--nbd-bg);
    color: var(--nbd-ink);
    font-family: var(--nbd-font-body);
    font-size: var(--nbd-text-md);
    line-height: var(--nbd-leading-body);
    -webkit-font-smoothing: antialiased;
  }
  .hero {
    background: linear-gradient(135deg, var(--nbd-orange-soft), rgba(232,114,12,0));
    border-bottom: 1px solid var(--nbd-line);
    padding: var(--nbd-space-8) var(--nbd-space-5) var(--nbd-space-6);
  }
  .hero-inner {
    max-width: 820px;
    margin: 0 auto;
  }
  .hero-mark {
    display: flex;
    align-items: center;
    gap: var(--nbd-space-3);
    margin-bottom: var(--nbd-space-4);
  }
  .hero-logo {
    height: 44px;
    width: auto;
    display: block;
    flex-shrink: 0;
  }
  .hero-brand {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-xs);
    letter-spacing: var(--nbd-tracking-widest);
    text-transform: uppercase;
    color: var(--nbd-orange);
    font-weight: 700;
    margin: 0;
  }
  .hero-title {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-3xl);
    font-weight: 800;
    line-height: var(--nbd-leading-tight);
    color: var(--nbd-ink);
    margin-bottom: var(--nbd-space-1);
  }
  .hero-sub {
    color: var(--nbd-ink-muted);
    font-size: var(--nbd-text-sm);
  }
  main {
    max-width: 820px;
    margin: 0 auto;
    padding: var(--nbd-space-5);
  }
  .card {
    background: var(--nbd-bg-elevated);
    border: 1px solid var(--nbd-line);
    border-radius: var(--nbd-radius-lg);
    padding: var(--nbd-space-5);
    margin-bottom: var(--nbd-space-4);
    box-shadow: var(--nbd-shadow-sm);
  }
  .card-label {
    font-family: var(--nbd-font-display);
    font-size: 10px;
    letter-spacing: var(--nbd-tracking-widest);
    text-transform: uppercase;
    color: var(--nbd-ink-muted);
    margin-bottom: var(--nbd-space-2);
    font-weight: 700;
  }
  .card-title {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-xl);
    font-weight: 800;
    color: var(--nbd-ink);
    margin-bottom: var(--nbd-space-3);
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--nbd-space-4);
  }
  @media (max-width: 600px) { .row { grid-template-columns: 1fr; } }
  .kv-key {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: var(--nbd-tracking-widest);
    color: var(--nbd-ink-subtle);
    font-family: var(--nbd-font-display);
    font-weight: 700;
  }
  .kv-val {
    font-size: var(--nbd-text-md);
    color: var(--nbd-ink);
    margin-top: 2px;
  }
  .big-num {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-3xl);
    font-weight: 800;
    color: var(--nbd-orange);
    line-height: 1;
  }
  .pill {
    display: inline-block;
    font-size: var(--nbd-text-xs);
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-wider);
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: var(--nbd-radius-pill);
    border: 1px solid var(--nbd-line);
  }
  .pill-green  { color: var(--nbd-success); border-color: rgba(22,163,74,.35); background: var(--nbd-success-soft); }
  .pill-orange { color: var(--nbd-orange-ink); border-color: var(--nbd-orange-medium); background: var(--nbd-orange-soft); }
  .pill-red    { color: var(--nbd-danger); border-color: rgba(220,38,38,.35); background: var(--nbd-danger-soft); }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-sm);
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-wider);
    text-transform: uppercase;
    background: var(--nbd-orange);
    color: var(--nbd-ink-on-orange);
    border: none;
    padding: 13px 22px;
    border-radius: var(--nbd-radius-md);
    cursor: pointer;
    text-decoration: none;
    min-height: 46px;
    transition: background .15s, transform .1s, box-shadow .15s;
  }
  .btn:hover  { background: var(--nbd-orange-deep); box-shadow: var(--nbd-shadow-md); }
  .btn:active { transform: scale(.98); }
  .btn-ghost {
    background: transparent;
    color: var(--nbd-orange);
    border: 1px solid var(--nbd-orange);
  }
  .btn-ghost:hover { background: var(--nbd-orange-soft); }
  .cal-embed {
    width: 100%;
    height: 680px;
    border: 1px solid var(--nbd-line);
    border-radius: var(--nbd-radius-lg);
    background: #fff;
  }
  @media (max-width: 600px) { .cal-embed { height: 820px; } }
  /* Project photo gallery — square tiles, generous spacing.
     Tap a tile to open the full 1600px variant in a new tab. */
  .ph-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: var(--nbd-space-2);
    margin-top: var(--nbd-space-3);
  }
  .ph-tile {
    display: block;
    aspect-ratio: 1;
    border-radius: var(--nbd-radius-md);
    overflow: hidden;
    background: var(--nbd-bg-sunken);
    border: 1px solid var(--nbd-line);
    transition: transform .12s ease, box-shadow .12s ease;
  }
  .ph-tile:hover { transform: translateY(-1px); box-shadow: var(--nbd-shadow-md); }
  .ph-tile img { width: 100%; height: 100%; object-fit: cover; display: block; pointer-events: none; }

  /* Phase 5: Phase tabs + location filter chips above the gallery */
  .ph-tabs {
    display: flex; gap: var(--nbd-space-2);
    margin: var(--nbd-space-3) 0 var(--nbd-space-2);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .ph-tab {
    border: 1px solid var(--nbd-line);
    background: var(--nbd-bg-elevated);
    color: var(--nbd-ink-muted);
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-sm);
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-wide);
    padding: 7px 14px;
    border-radius: var(--nbd-radius-pill);
    cursor: pointer;
    white-space: nowrap;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .12s, color .12s, border-color .12s;
  }
  .ph-tab:hover { border-color: var(--nbd-orange); color: var(--nbd-ink); }
  .ph-tab[aria-pressed="true"] {
    background: var(--nbd-orange); color: var(--nbd-ink-on-orange);
    border-color: var(--nbd-orange);
  }
  .ph-tab-count {
    font-family: var(--nbd-font-body); font-weight: 600;
    background: rgba(0,0,0,.10); padding: 1px 7px; border-radius: 10px;
    font-size: 11px;
  }
  .ph-tab[aria-pressed="true"] .ph-tab-count {
    background: rgba(255,255,255,.22);
  }
  .ph-chips {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin: 0 0 var(--nbd-space-3);
  }
  .ph-chip {
    border: 1px solid var(--nbd-line);
    background: var(--nbd-bg-elevated);
    color: var(--nbd-ink-muted);
    font-family: var(--nbd-font-body);
    font-size: 11.5px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: var(--nbd-radius-pill);
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
    transition: background .12s, color .12s, border-color .12s;
  }
  .ph-chip:hover { border-color: var(--nbd-orange); color: var(--nbd-ink); }
  .ph-chip-active {
    background: var(--nbd-orange-soft); border-color: var(--nbd-orange);
    color: var(--nbd-orange-ink);
  }
  .ph-chip-count {
    font-weight: 500; color: var(--nbd-ink-subtle); font-size: 10.5px;
  }
  .ph-empty {
    padding: var(--nbd-space-6) var(--nbd-space-4);
    text-align: center; color: var(--nbd-ink-subtle);
    font-size: var(--nbd-text-sm);
    border: 1px dashed var(--nbd-line);
    border-radius: var(--nbd-radius-md);
    margin-top: var(--nbd-space-3);
  }
  .error-state, .loading-state {
    text-align: center;
    padding: 56px 20px;
    color: var(--nbd-ink-muted);
  }
  .error-state h2 {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-2xl);
    color: var(--nbd-danger);
    margin: var(--nbd-space-2) 0 var(--nbd-space-3);
  }
  footer {
    max-width: 820px;
    margin: var(--nbd-space-6) auto var(--nbd-space-10);
    padding: 0 var(--nbd-space-5);
    color: var(--nbd-ink-muted);
    font-size: var(--nbd-text-xs);
    text-align: center;
  }
  footer a { color: var(--nbd-orange); text-decoration: none; }

  /* ── Project progress timeline ─────────────────────────────────── */
  .progress-card{ overflow:hidden; }
  .progress-track{
    display:flex; align-items:flex-start; justify-content:space-between;
    margin-top: var(--nbd-space-4); gap: var(--nbd-space-2);
    position:relative;
  }
  .progress-track::before{
    content:''; position:absolute; top:13px; left:14px; right:14px;
    height:3px; background: var(--nbd-line); border-radius:2px;
    z-index:0;
  }
  .progress-track-fill{
    position:absolute; top:13px; left:14px; height:3px;
    background: linear-gradient(90deg, var(--nbd-orange), var(--nbd-success));
    border-radius:2px; z-index:1;
    transition: width .4s cubic-bezier(.16,1,.3,1);
  }
  .progress-step{
    flex:1; text-align:center; position:relative; z-index:2;
    min-width:0;
  }
  .progress-dot{
    width:28px; height:28px; border-radius:50%;
    margin:0 auto var(--nbd-space-2); display:flex; align-items:center; justify-content:center;
    background: var(--nbd-bg-elevated); border: 2px solid var(--nbd-line);
    font-size: var(--nbd-text-sm); font-weight:800; color: var(--nbd-ink-subtle);
    transition:all .2s;
  }
  .progress-step.done .progress-dot{
    background: var(--nbd-success); border-color: var(--nbd-success); color:#fff;
  }
  .progress-step.current .progress-dot{
    background: var(--nbd-orange); border-color: var(--nbd-orange); color:#fff;
    box-shadow:0 0 0 6px var(--nbd-orange-glow);
    animation:progress-pulse 2s ease-in-out infinite;
  }
  @keyframes progress-pulse {
    0%,100% { box-shadow: 0 0 0 6px var(--nbd-orange-glow); }
    50%     { box-shadow: 0 0 0 9px rgba(232,114,12,.12); }
  }
  .progress-step-label{
    font-size: var(--nbd-text-xs); font-weight:700; color: var(--nbd-ink-subtle);
    letter-spacing: var(--nbd-tracking-wide); line-height:1.2;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .progress-step.done .progress-step-label,
  .progress-step.current .progress-step-label{ color: var(--nbd-ink); }
  .progress-next{
    margin-top: var(--nbd-space-4); padding: var(--nbd-space-3) var(--nbd-space-4);
    background: var(--nbd-orange-soft); border: 1px solid var(--nbd-orange-medium);
    border-radius: var(--nbd-radius-md);
    font-size: var(--nbd-text-sm); color: var(--nbd-ink); line-height:1.5;
  }
  .progress-next-label{
    font-size:10px; font-weight:700; letter-spacing: var(--nbd-tracking-widest);
    text-transform: uppercase; color: var(--nbd-orange); margin-bottom: var(--nbd-space-1);
  }
  @media (max-width:520px){
    .progress-step-label{ font-size:9px; }
    .progress-dot{ width:24px; height:24px; font-size:11px; }
    .progress-track::before, .progress-track-fill{ top:11px; }
  }
</style>
<link rel="stylesheet" href="/assets/css/nbd-mobile.css">
</head>
<body class="nbd-brand">

<div id="heroWrap" class="hero" style="display:none;">
  <div class="hero-inner">
    <div class="hero-mark">
      <img class="hero-logo" src="/assets/images/nbd-logo.png" alt="No Big Deal Home Solutions" />
      <div class="hero-brand" id="heroCompany">No Big Deal Home Solutions</div>
    </div>
    <div class="hero-title" id="heroTitle">—</div>
    <div class="hero-sub" id="heroSub">—</div>
  </div>
</div>

<main id="mainWrap">
  <div class="loading-state" id="loadingState">
    Loading your project...
  </div>
</main>

<footer>
  © 2026 No Big Deal Home Solutions ·
  <a href="https://nobigdealwithjoedeal.com">nobigdealwithjoedeal.com</a>
</footer>

<script src="js/portal.js" defer></script>
</body>
</html>
