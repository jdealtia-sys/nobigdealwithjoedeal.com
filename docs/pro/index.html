<!DOCTYPE html>
<html lang="en" data-theme="nbd-original"><head>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/pro/img/nbd-icon-192.png"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBD Pro</title>
<script type="module">
// Smart router: logged-in users → dashboard, everyone else → landing
import { NBDAuth } from '/pro/js/nbd-auth.js';

NBDAuth.init({
  requiredPlan: 'free',
  onReady: (user) => {
    if (user) {
      window.location.replace('/pro/dashboard.html');
    } else {
      window.location.replace('/pro/landing.html');
    }
  }
});

// Safety fallback — if auth takes >3s, send to landing
setTimeout(() => {
  if (document.visibilityState !== 'hidden') {
    window.location.replace('/pro/landing.html');
  }
}, 3000);
</script>
  <meta property="og:url" content="https://nobigdealwithjoedeal.com/pro">
</head><body></body></html>
