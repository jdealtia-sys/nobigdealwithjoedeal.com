<!doctype html>
<html lang="en" data-nbd-brand="true">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#faf8f5">
<meta name="robots" content="noindex, nofollow">
<title>Your Estimate — No Big Deal</title>
<!--
  Wave 146: customer-facing estimate preview.
  - URL shape: /pro/estimate-view.html?token=TOK&estimateId=EST
  - Calls getEstimateForView (token-authed) which validates the
    portal token, checks the estimate belongs to the same lead,
    stamps viewedAt + bumps viewCount, and returns a redacted
    estimate doc.
  - The page renders the customer-facing format (no internal
    margin, no cost basis) using a minimal inline renderer. We
    deliberately don't load the full estimate-finalization.js
    bundle here to keep the customer payload small + fast on
    cellular.

  Brand: photo system Phase 1 + audit batch 1 (2026-05-13). Every
  customer-facing surface reads color/type/space from nbd-brand.css
  so the estimate this homeowner sees matches the portal they were
  shown and the PDF they'll receive. Was hardcoded; was the only
  customer-facing page missing brand alignment after Phase 1.
-->
<link rel="preconnect" href="https://us-central1-nobigdeal-pro.cloudfunctions.net">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/nbd-brand.css">
<style>
  /* Estimate document layout — palette-free; every color/type/space
     value reads from nbd-brand.css. */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--nbd-font-body);
    background: var(--nbd-bg);
    color: var(--nbd-ink);
    line-height: var(--nbd-leading-body);
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .ev-shell {
    max-width: 760px;
    margin: 0 auto;
    padding: var(--nbd-space-6) var(--nbd-space-4) var(--nbd-space-16);
  }
  .ev-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--nbd-space-4);
    padding-bottom: var(--nbd-space-5);
    border-bottom: 3px solid var(--nbd-orange);
    margin-bottom: var(--nbd-space-6);
  }
  .ev-brand {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-xl);
    font-weight: 800;
    letter-spacing: var(--nbd-tracking-wide);
    text-transform: uppercase;
    color: var(--nbd-ink);
  }
  .ev-brand span { color: var(--nbd-orange); }
  .ev-badge {
    display: inline-block;
    margin-top: var(--nbd-space-2);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-widest);
    text-transform: uppercase;
    color: var(--nbd-orange);
    border: 1px solid var(--nbd-orange);
    padding: 2px 9px;
    border-radius: var(--nbd-radius-sm);
  }
  .ev-doc-title {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-3xl);
    font-weight: 800;
    letter-spacing: var(--nbd-tracking-wider);
    text-transform: uppercase;
    color: var(--nbd-ink);
    text-align: right;
  }
  .ev-doc-meta {
    font-size: var(--nbd-text-xs);
    color: var(--nbd-ink-muted);
    text-align: right;
    margin-top: var(--nbd-space-1);
  }
  .ev-section-title {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-sm);
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-widest);
    text-transform: uppercase;
    color: var(--nbd-ink);
    margin: var(--nbd-space-6) 0 var(--nbd-space-3);
    padding-bottom: var(--nbd-space-1);
    border-bottom: 2px solid var(--nbd-orange);
  }
  .ev-customer {
    background: var(--nbd-bg-elevated);
    border: 1px solid var(--nbd-line);
    border-radius: var(--nbd-radius-md);
    padding: var(--nbd-space-4);
    margin-bottom: var(--nbd-space-4);
  }
  .ev-customer dt {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-widest);
    text-transform: uppercase;
    color: var(--nbd-ink-subtle);
    margin-bottom: 2px;
  }
  .ev-customer dd {
    margin: 0 0 var(--nbd-space-2);
    font-size: var(--nbd-text-md);
    font-weight: 600;
    color: var(--nbd-ink);
  }
  .ev-tier-card {
    background: var(--nbd-bg-elevated);
    border: 1px solid var(--nbd-line);
    border-radius: var(--nbd-radius-md);
    padding: var(--nbd-space-5);
    margin-bottom: var(--nbd-space-3);
    text-align: center;
  }
  .ev-tier-card.featured {
    border: 2px solid var(--nbd-orange);
    box-shadow: 0 6px 20px var(--nbd-orange-glow);
  }
  .ev-tier-name {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-xl);
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-wider);
    text-transform: uppercase;
    color: var(--nbd-ink);
  }
  .ev-tier-total {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-4xl);
    font-weight: 800;
    color: var(--nbd-orange);
    margin-top: var(--nbd-space-2);
  }
  .ev-line-list {
    list-style: none;
    padding: 0;
    margin: 0 0 var(--nbd-space-4);
    background: var(--nbd-bg-elevated);
    border: 1px solid var(--nbd-line);
    border-radius: var(--nbd-radius-md);
    overflow: hidden;
  }
  .ev-line {
    display: flex;
    justify-content: space-between;
    gap: var(--nbd-space-3);
    padding: var(--nbd-space-3) var(--nbd-space-4);
    border-bottom: 1px solid var(--nbd-line-rule);
    font-size: var(--nbd-text-sm);
  }
  .ev-line:last-child { border-bottom: none; }
  .ev-line-name { flex: 1; }
  .ev-line-qty {
    color: var(--nbd-ink-muted);
    font-size: var(--nbd-text-xs);
    min-width: 80px;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .ev-line-amt {
    font-weight: 600;
    min-width: 80px;
    text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--nbd-ink);
  }
  .ev-grand {
    background: var(--nbd-orange);
    color: var(--nbd-ink-on-orange);
    border-radius: var(--nbd-radius-md);
    padding: var(--nbd-space-5) var(--nbd-space-6);
    margin-bottom: var(--nbd-space-6);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ev-grand-lbl {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-sm);
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-widest);
    text-transform: uppercase;
  }
  .ev-grand-val {
    font-family: var(--nbd-font-display);
    font-size: var(--nbd-text-4xl);
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }
  .ev-cta-row {
    display: flex;
    flex-wrap: wrap;
    gap: var(--nbd-space-3);
    margin: var(--nbd-space-6) 0;
  }
  .ev-cta-row a {
    flex: 1;
    min-width: 140px;
    text-align: center;
    background: var(--nbd-orange);
    color: var(--nbd-ink-on-orange);
    text-decoration: none;
    padding: var(--nbd-space-4) var(--nbd-space-5);
    border-radius: var(--nbd-radius-md);
    font-weight: 700;
    letter-spacing: var(--nbd-tracking-wide);
    font-size: var(--nbd-text-md);
    -webkit-tap-highlight-color: transparent;
    transition: background .15s ease, box-shadow .15s ease;
  }
  .ev-cta-row a:hover { background: var(--nbd-orange-deep); box-shadow: var(--nbd-shadow-md); }
  .ev-cta-row a.ghost {
    background: transparent;
    color: var(--nbd-orange);
    border: 1px solid var(--nbd-orange);
  }
  .ev-cta-row a.ghost:hover { background: var(--nbd-orange-soft); }
  .ev-error, .ev-loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--nbd-ink-muted);
    font-size: var(--nbd-text-sm);
  }
  .ev-error { color: var(--nbd-danger); }
  .ev-foot {
    margin-top: var(--nbd-space-8);
    padding-top: var(--nbd-space-5);
    border-top: 1px solid var(--nbd-line);
    font-size: var(--nbd-text-xs);
    color: var(--nbd-ink-subtle);
    text-align: center;
  }
  @media print { body { background: #fff; } .ev-cta-row { display: none; } }
</style>
</head>
<body class="nbd-brand">
<main class="ev-shell" id="evRoot">
  <div class="ev-loading">Loading your estimate…</div>
</main>
<script src="js/estimate-view.js" defer></script>
</body>
</html>
