<!doctype html>
<html lang="en" data-theme="nbd-original">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Photo Review · NBD Pro</title>
<link rel="icon" href="/pro/favicon.svg">
<!-- Rep-facing surface: uses the dashboard's theme system (dark base
     with Joe's chosen theme) — distinct from portal/PDFs which are
     locked to the customer-facing nbd-brand.css palette. The Review
     Sprint UI is Joe's workspace. -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700;800&display=swap">
<link rel="stylesheet" href="css/theme-system.css">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg, #0A0C0F);
    color: var(--t, #E8EAF0);
    font-family: 'Barlow', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  a { color: var(--orange); text-decoration: none; }

  /* ── Top header (lead + stats + actions) ──────────────────────── */
  .pr-header {
    position: sticky; top: 0; z-index: 50;
    background: var(--s, #111418);
    border-bottom: 1px solid var(--br, rgba(255,255,255,.07));
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
  }
  .pr-back {
    background: transparent; border: 1px solid var(--br);
    color: var(--t); padding: 8px 12px; border-radius: 7px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .12s, border-color .12s;
    text-decoration: none;
  }
  .pr-back:hover { border-color: var(--orange); }
  .pr-title { flex: 1; min-width: 0; }
  .pr-eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: .14em;
    color: var(--orange); text-transform: uppercase;
    line-height: 1;
  }
  .pr-leadname {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px; font-weight: 800; color: var(--t);
    margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .pr-stats { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .pr-counter {
    font-size: 12px; color: var(--m, #6B7280);
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase;
    white-space: nowrap;
  }
  .pr-counter strong { color: var(--t); font-size: 14px; }
  .pr-cta {
    background: var(--orange); border: none; color: #fff;
    padding: 9px 16px; border-radius: 7px; font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; letter-spacing: .08em; text-transform: uppercase;
    cursor: pointer;
    transition: background .12s, opacity .12s, transform .08s;
  }
  .pr-cta:hover:not(:disabled) { background: #ff8420; }
  .pr-cta:active:not(:disabled) { transform: scale(.97); }
  .pr-cta:disabled { opacity: .4; cursor: not-allowed; }
  @media (max-width: 720px) {
    .pr-counter { display: none; }
    .pr-leadname { font-size: 15px; }
  }

  /* ── Filter bar ───────────────────────────────────────────────── */
  .pr-filter-bar {
    display: flex; gap: 8px; padding: 10px 16px;
    overflow-x: auto;
    border-bottom: 1px solid var(--br);
    background: var(--s);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: thin;
  }
  .pr-filter {
    background: var(--s2, #181C22); border: 1px solid var(--br);
    color: var(--t); padding: 7px 14px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: .06em; text-transform: uppercase;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    display: inline-flex; align-items: center; gap: 6px;
    transition: background .12s, border-color .12s, color .12s;
  }
  .pr-filter:hover { border-color: var(--orange); }
  .pr-filter.active {
    background: var(--orange); border-color: var(--orange); color: #fff;
  }
  .pr-filter-count {
    background: rgba(255,255,255,.12); color: inherit;
    padding: 1px 7px; border-radius: 10px; font-size: 11px;
    font-family: 'Barlow', sans-serif; font-weight: 600;
    letter-spacing: 0; min-width: 18px; text-align: center;
  }
  .pr-filter.active .pr-filter-count { background: rgba(255,255,255,.22); }

  /* ── Body / grid ─────────────────────────────────────────────── */
  .pr-body { padding: 16px; padding-bottom: 100px; user-select: none; }
  .pr-empty {
    text-align: center; padding: 60px 20px; color: var(--m);
    font-size: 14px;
  }
  .pr-empty strong { color: var(--t); font-size: 17px; display: block; margin-bottom: 6px; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; }

  .pr-group { margin-bottom: 28px; }
  .pr-group-head {
    display: flex; align-items: baseline; gap: 10px;
    padding: 6px 4px 12px;
    border-bottom: 1px solid var(--br);
    margin-bottom: 14px;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .pr-group-label {
    font-size: 18px; font-weight: 800; color: var(--t);
    letter-spacing: .06em; text-transform: uppercase;
  }
  .pr-group-count { font-size: 12px; color: var(--m); font-weight: 600; letter-spacing: .1em; text-transform: uppercase; }
  .pr-group[data-phase="Before"]   .pr-group-label { color: #f87171; }
  .pr-group[data-phase="During"]   .pr-group-label { color: var(--orange); }
  .pr-group[data-phase="After"]    .pr-group-label { color: #4ade80; }
  .pr-group[data-phase="unsorted"] .pr-group-label { color: var(--m); }

  .pr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }

  /* ── Photo tile ──────────────────────────────────────────────── */
  .pr-tile {
    background: var(--s2);
    border: 1px solid var(--br);
    border-radius: 10px;
    overflow: hidden;
    position: relative;
    transition: border-color .12s, transform .08s, box-shadow .12s;
    cursor: pointer;
    display: flex; flex-direction: column;
  }
  .pr-tile:hover { border-color: rgba(232,114,12,.5); }
  .pr-tile.pr-selected {
    border-color: var(--orange);
    box-shadow: 0 0 0 2px var(--orange), 0 8px 22px rgba(232,114,12,.25);
    transform: translateY(-1px);
  }
  .pr-tile-imgwrap {
    position: relative;
    aspect-ratio: 4 / 3;
    background: #050608;
    overflow: hidden;
  }
  .pr-tile-imgwrap img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    pointer-events: none;
  }
  .pr-tile-conf {
    position: absolute; top: 8px; left: 8px;
    width: 22px; height: 22px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.15);
    font-size: 9px; font-weight: 700;
    pointer-events: none;
    transition: background .15s;
  }
  .pr-tile-conf-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--m);
  }
  .pr-tile-conf[data-level="high"]   .pr-tile-conf-dot { background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,.55); }
  .pr-tile-conf[data-level="medium"] .pr-tile-conf-dot { background: #fbbf24; }
  .pr-tile-conf[data-level="low"]    .pr-tile-conf-dot { background: #f87171; }

  /* Selected checkmark badge */
  .pr-tile-check {
    position: absolute; top: 8px; right: 8px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(0,0,0,.55);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,.25);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
    opacity: 0;
    transition: opacity .12s, background .12s, border-color .12s;
    pointer-events: none;
  }
  .pr-tile.pr-selected .pr-tile-check {
    opacity: 1; background: var(--orange); border-color: var(--orange);
  }

  /* Loading / no-AI-yet shimmer */
  .pr-tile-pending::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(232,114,12,.10), transparent);
    background-size: 200% 100%;
    animation: pr-shimmer 1.8s linear infinite;
    pointer-events: none;
  }
  @keyframes pr-shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  /* Tile body — chips + caption */
  .pr-tile-body { padding: 8px 8px 10px; }
  .pr-tile-chips {
    display: flex; flex-wrap: wrap; gap: 4px;
    margin-bottom: 6px;
  }
  .pr-chip {
    border: 1px dashed transparent; background: transparent;
    color: var(--m);
    padding: 3px 8px; border-radius: 14px;
    font-size: 10.5px; font-weight: 700;
    font-family: 'Barlow', sans-serif;
    letter-spacing: .02em;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    white-space: nowrap;
    transition: background .12s, color .12s, border-color .12s, transform .08s;
    -webkit-tap-highlight-color: transparent;
    line-height: 1.2;
  }
  .pr-chip:active { transform: scale(.95); }
  /* Suggested state — AI gave a value, rep hasn't accepted yet */
  .pr-chip[data-state="suggested"] {
    border-color: rgba(232,114,12,.55);
    color: var(--orange);
    background: rgba(232,114,12,.06);
  }
  .pr-chip[data-state="suggested"]:hover {
    background: rgba(232,114,12,.14);
    border-style: solid;
  }
  /* Accepted state — rep tapped to accept the suggestion */
  .pr-chip[data-state="accepted"] {
    border: 1px solid var(--orange);
    background: var(--orange); color: #fff;
  }
  /* Overridden state — rep changed value from what AI suggested */
  .pr-chip[data-state="overridden"] {
    border: 1px solid #4ade80;
    background: rgba(74,222,128,.16); color: #4ade80;
  }
  /* Empty state — no AI suggestion + no rep value */
  .pr-chip[data-state="empty"] {
    border: 1px dashed var(--br);
    color: var(--m);
  }
  .pr-chip[data-state="empty"]:hover {
    border-color: var(--orange); color: var(--orange);
  }
  .pr-tile-caption {
    font-size: 11.5px; color: var(--m); line-height: 1.35;
    overflow: hidden; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    min-height: 30px;
  }
  .pr-tile-caption[data-state="ai"] { color: rgba(232,114,12,.85); font-style: italic; }
  .pr-tile-caption[data-state="rep"] { color: var(--t); font-style: normal; }
  .pr-tile-caption[data-state="empty"] { color: var(--br); font-style: italic; }

  /* ── Picker overlay (long-press chip → mini sheet) ─────────────── */
  .pr-picker {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.75);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .16s;
  }
  .pr-picker[data-open="true"] { opacity: 1; pointer-events: auto; }
  .pr-picker-sheet {
    background: var(--s); border: 1px solid var(--br);
    border-radius: 14px;
    padding: 22px; min-width: 260px; max-width: 420px; width: 100%;
    box-shadow: 0 22px 60px rgba(0,0,0,.5);
  }
  .pr-picker-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700; letter-spacing: .14em;
    text-transform: uppercase; color: var(--m);
    margin-bottom: 14px;
  }
  .pr-picker-options {
    display: flex; flex-wrap: wrap; gap: 8px;
  }
  .pr-picker-opt {
    background: var(--s2); border: 1px solid var(--br);
    color: var(--t); padding: 10px 16px; border-radius: 10px;
    font-size: 13px; font-weight: 700;
    font-family: 'Barlow', sans-serif;
    cursor: pointer; flex: 1; min-width: 80px;
    text-align: center;
    transition: background .12s, border-color .12s, transform .08s;
  }
  .pr-picker-opt:hover { border-color: var(--orange); }
  .pr-picker-opt:active { transform: scale(.96); }
  .pr-picker-opt.pr-picker-opt-current {
    background: var(--orange); border-color: var(--orange); color: #fff;
  }
  .pr-picker-clear {
    background: transparent; border: 1px solid var(--br);
    color: var(--m); padding: 10px; border-radius: 10px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    margin-top: 12px; width: 100%;
  }

  /* ── Bulk-select action bar (slides up from bottom) ───────────── */
  .pr-bulk-bar {
    position: fixed; left: 12px; right: 12px; bottom: 12px;
    z-index: 80;
    background: var(--s);
    border: 1px solid var(--orange);
    border-radius: 12px;
    padding: 10px 12px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 12px 32px rgba(0,0,0,.5), 0 0 0 1px rgba(232,114,12,.25);
    transform: translateY(120%);
    transition: transform .22s cubic-bezier(.16,1,.3,1);
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .pr-bulk-bar[data-open="true"] { transform: translateY(0); }
  .pr-bulk-count {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px; font-weight: 800; color: var(--orange);
    letter-spacing: .08em; text-transform: uppercase;
    white-space: nowrap;
  }
  .pr-bulk-spacer { flex: 1; }
  .pr-bulk-btn {
    background: var(--s2); border: 1px solid var(--br);
    color: var(--t); padding: 7px 12px; border-radius: 8px;
    font-size: 12px; font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: .06em; text-transform: uppercase;
    cursor: pointer; white-space: nowrap;
    transition: background .12s, border-color .12s, transform .08s;
  }
  .pr-bulk-btn:hover { border-color: var(--orange); }
  .pr-bulk-btn:active { transform: scale(.96); }
  .pr-bulk-btn-danger { color: #f87171; border-color: rgba(248,113,113,.4); }
  .pr-bulk-btn-clear { color: var(--m); }
  .pr-bulk-btn-share { color: #4ade80; border-color: rgba(74,222,128,.4); }

  /* ── Lasso (desktop selection rectangle) ──────────────────────── */
  .pr-lasso {
    position: absolute;
    border: 1.5px dashed var(--orange);
    background: rgba(232,114,12,.06);
    pointer-events: none;
    z-index: 30;
    border-radius: 4px;
    display: none;
  }

  /* ── Lightbox (long-press tile to open full-size) ─────────────── */
  .pr-lightbox {
    position: fixed; inset: 0; z-index: 250;
    background: rgba(0,0,0,.92);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity .16s;
  }
  .pr-lightbox[data-open="true"] { opacity: 1; pointer-events: auto; }
  .pr-lightbox img {
    max-width: 100%; max-height: 100%; object-fit: contain;
    border-radius: 10px;
    box-shadow: 0 24px 60px rgba(0,0,0,.5);
  }
  .pr-lightbox-close {
    position: absolute; top: 14px; right: 14px;
    background: rgba(0,0,0,.5); color: #fff;
    border: 1px solid rgba(255,255,255,.2);
    border-radius: 50%; width: 38px; height: 38px;
    font-size: 18px; cursor: pointer;
  }

  /* ── Toast ─────────────────────────────────────────────────── */
  .pr-toast {
    position: fixed; left: 50%; transform: translateX(-50%) translateY(20px);
    bottom: 80px;
    background: var(--s); border: 1px solid var(--br);
    color: var(--t); padding: 10px 18px; border-radius: 24px;
    font-size: 13px; font-weight: 600; white-space: nowrap;
    box-shadow: 0 10px 28px rgba(0,0,0,.5);
    opacity: 0; pointer-events: none;
    z-index: 300;
    transition: opacity .18s, transform .18s;
  }
  .pr-toast[data-open="true"] {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* ── Loading state ─────────────────────────────────────────── */
  .pr-loading {
    text-align: center; padding: 80px 20px;
    color: var(--m); font-size: 14px;
  }
  .pr-spinner {
    display: inline-block; width: 22px; height: 22px;
    border: 2px solid var(--br); border-top-color: var(--orange);
    border-radius: 50%; animation: pr-spin .8s linear infinite;
    margin-right: 10px; vertical-align: middle;
  }
  @keyframes pr-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<header class="pr-header">
  <a href="#" class="pr-back" id="prBack">← Back</a>
  <div class="pr-title">
    <div class="pr-eyebrow">Photo Review</div>
    <div class="pr-leadname" id="prLeadName">Loading…</div>
  </div>
  <div class="pr-stats">
    <div class="pr-counter" id="prCounter"><strong>0</strong>/<span id="prTotal">0</span> reviewed</div>
    <button class="pr-cta" id="prGenerateBtn" disabled>Generate Report</button>
  </div>
</header>

<div class="pr-filter-bar" id="prFilterBar">
  <button class="pr-filter active" data-filter="all">All <span class="pr-filter-count" id="cnt-all">0</span></button>
  <button class="pr-filter" data-filter="Before">Before <span class="pr-filter-count" id="cnt-Before">0</span></button>
  <button class="pr-filter" data-filter="During">During <span class="pr-filter-count" id="cnt-During">0</span></button>
  <button class="pr-filter" data-filter="After">After <span class="pr-filter-count" id="cnt-After">0</span></button>
  <button class="pr-filter" data-filter="unsorted">Needs review <span class="pr-filter-count" id="cnt-unsorted">0</span></button>
</div>

<main class="pr-body" id="prBody">
  <div class="pr-loading"><span class="pr-spinner"></span>Loading photos…</div>
</main>

<!-- Picker overlay -->
<div class="pr-picker" id="prPicker">
  <div class="pr-picker-sheet">
    <div class="pr-picker-title" id="prPickerTitle">Choose</div>
    <div class="pr-picker-options" id="prPickerOptions"></div>
    <button class="pr-picker-clear" id="prPickerClear">Clear value</button>
  </div>
</div>

<!-- Bulk action bar -->
<div class="pr-bulk-bar" id="prBulkBar">
  <span class="pr-bulk-count" id="prBulkCount">0 selected</span>
  <button class="pr-bulk-btn" data-bulk-field="phase">Phase</button>
  <button class="pr-bulk-btn" data-bulk-field="damageType">Damage</button>
  <button class="pr-bulk-btn" data-bulk-field="severity">Severity</button>
  <!-- Phase 5: mark selected photos visible on the homeowner portal.
       The existing getHomeownerPortalView filters by sharedWithHomeowner,
       so flipping this flag makes the photos appear immediately in the
       homeowner's portal view. -->
  <button class="pr-bulk-btn pr-bulk-btn-share" id="prBulkShare">📤 Share</button>
  <button class="pr-bulk-btn pr-bulk-btn-danger" id="prBulkDelete">Delete</button>
  <div class="pr-bulk-spacer"></div>
  <button class="pr-bulk-btn pr-bulk-btn-clear" id="prBulkClear">Done</button>
</div>

<!-- Lightbox -->
<div class="pr-lightbox" id="prLightbox">
  <button class="pr-lightbox-close" id="prLightboxClose">×</button>
  <img id="prLightboxImg" src="" alt="">
</div>

<div class="pr-lasso" id="prLasso"></div>
<div class="pr-toast" id="prToast"></div>

<!-- Phase 5: portal-link helpers power the "Share" bulk action so a
     rep can mark selected photos shared + open the SMS/copy/email
     share flow with one click. -->
<script src="js/portal-link-helpers.js?v=1"></script>

<script type="module" src="js/pages/photo-review.js?v=1"></script>
</body>
</html>
