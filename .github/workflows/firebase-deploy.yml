name: Firebase deploy

# Auto-deploys the site to Firebase on every push to main.
#
# Gracefully skips when the FIREBASE_SERVICE_ACCOUNT secret is not
# configured — that way this file can live in main from day one
# without generating failure emails before go-live.
#
# Deploy order (when the secret IS set):
#   1. Firestore rules (pro project)
#   2. Storage rules
#   3. Cloud Functions
#   4. Hosting
#   5. Marketing-project Firestore rules (separate project)
#
# ─────────────────────────────────────────────────────────────
# REQUIRED GITHUB ACTIONS SECRET (one-time setup to enable deploys)
# ─────────────────────────────────────────────────────────────
# Name:  FIREBASE_SERVICE_ACCOUNT
# Value: the contents of a Firebase service-account JSON file with
#        Cloud Functions Deployer + Cloud Datastore User + Firebase
#        Hosting Admin + Firebase Rules Admin roles.
#
# How to generate:
#   1. Firebase Console → Project Settings → Service accounts →
#      "Generate new private key" → download JSON
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      New repository secret → name: FIREBASE_SERVICE_ACCOUNT,
#      value: paste the entire JSON file contents
#   3. NEVER commit the JSON to the repo. GitHub Secrets are the
#      only place it should live.
#
# Until the secret is set, every workflow run will be a quick
# "skipped — secret not configured" notice, NOT a failure email.
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      # Skip doc-only changes
      - 'docs/**'
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'storage.rules'
      - 'marketing-site-firestore.rules'
      - 'firebase.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - hosting
          - functions
          - rules
          - marketing-rules

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────
  # check — read whether the secret is set. Always succeeds.
  # Outputs `configured=true|false` for the deploy job's `if:`.
  # This runs without accessing the secret's value, only its presence,
  # so it's cheap and GitHub-Actions-safe.
  # ─────────────────────────────────────────────────────────
  check:
    name: Check if Firebase credentials are configured
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SA" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "::notice::FIREBASE_SERVICE_ACCOUNT is set — proceeding to deploy."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "### ⏸ Firebase deploy skipped"
              echo ""
              echo "The \`FIREBASE_SERVICE_ACCOUNT\` repository secret is not configured yet."
              echo "Auto-deploy is intentionally disabled until it's set — this is a safety feature, not an error."
              echo ""
              echo "**To enable auto-deploy:**"
              echo ""
              echo "1. Firebase Console → Project Settings → Service Accounts → *Generate new private key* → download the JSON."
              echo "2. GitHub repo → Settings → Secrets and variables → Actions → **New repository secret**"
              echo "   - Name: \`FIREBASE_SERVICE_ACCOUNT\`"
              echo "   - Value: paste the entire JSON file contents"
              echo "3. Push to main (or manually re-run this workflow from the Actions tab)."
              echo ""
              echo "Until then every push will show this notice instead of failing."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice::FIREBASE_SERVICE_ACCOUNT is not set — skipping deploy (this is expected before go-live)."
          fi

  # ─────────────────────────────────────────────────────────
  # deploy — runs only when credentials are present. Never runs on
  # an un-configured repo, so no more failure emails pre-go-live.
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    needs: check
    if: needs.check.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PRO_PROJECT: nobigdeal-pro
      MKT_PROJECT: nobigdealwithjoedeal
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi

      # Writes the service account JSON via an env var instead of shell
      # interpolation, which avoids GitHub Actions' "possible secret
      # exposure" warnings and is the recommended pattern.
      - name: Write service-account JSON to a temp file
        id: sa
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          SA_FILE="$RUNNER_TEMP/firebase-sa.json"
          printf '%s' "$SA_JSON" > "$SA_FILE"
          if [ ! -s "$SA_FILE" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT resolved to empty at deploy time."
            exit 1
          fi
          echo "sa_path=$SA_FILE" >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────────────────
      # Enable APIs that firebase-tools doesn't auto-enable. 2nd-gen
      # onSchedule functions need cloudscheduler.googleapis.com (the
      # CLI enables pubsub + eventarc automatically, but Scheduler is
      # on us). beforeUserCreated blocking triggers need Identity
      # Toolkit enabled for the blocking-functions config.
      # Idempotent — already-enabled APIs get a fast no-op.
      # ─────────────────────────────────────────────────────────
      - name: Enable required Google APIs
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'functions' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: |
          set +e
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud config set project "$PRO_PROJECT" --quiet
          # APIs firebase-tools doesn't auto-enable:
          #   cloudscheduler        — 2nd-gen onSchedule functions
          #   identitytoolkit       — beforeUserCreated/SignedIn blockers
          #   pubsub + eventarc     — 2nd-gen Storage / Firestore triggers
          #                           (onObjectFinalized, onDocumentWritten,
          #                           etc. fire through Eventarc → Pub/Sub)
          #   run, cloudbuild, artifactregistry — Gen 2 runtime substrate
          gcloud services enable \
            cloudscheduler.googleapis.com \
            identitytoolkit.googleapis.com \
            pubsub.googleapis.com \
            eventarc.googleapis.com \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            --project "$PRO_PROJECT" --quiet
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            echo "::warning::gcloud services enable returned $EXIT (SA likely lacks roles/serviceusage.serviceUsageAdmin). Manually enable in Cloud Console: cloudscheduler, identitytoolkit, pubsub, eventarc, run, cloudbuild, artifactregistry."
          fi
          # Generate the service identity for Pub/Sub. Gen-2 Storage
          # triggers (onAudioUploaded in voice-intelligence.js) fail
          # with "Error generating the service identity for
          # pubsub.googleapis.com" the first time after enabling the
          # API until this identity is explicitly provisioned.
          # Idempotent: succeeds quickly if already exists.
          for api in pubsub eventarc; do
            gcloud beta services identity create --service=${api}.googleapis.com \
              --project "$PRO_PROJECT" --quiet 2>/dev/null
          done
          echo "✓ Required APIs + service identities provisioned (or already on)."
          exit 0

      # ─────────────────────────────────────────────────────────
      # Ensure every integration secret my code defineSecret()'s
      # exists in Secret Manager. Any that are missing get created
      # with an empty value — the lazy-opt-in pattern in the runtime
      # code treats an empty string as "this integration isn't
      # configured, skip it" (see integrations/_shared.js hasSecret).
      #
      # Existing secrets (Stripe / Twilio / Resend / etc.) are LEFT
      # ALONE — we only create what's missing, never overwrite.
      #
      # Without this step the deploy fails the first time any new
      # `defineSecret('FOO')` is introduced, because firebase-tools
      # in non-interactive mode requires the secret resource to
      # already exist.
      # ─────────────────────────────────────────────────────────
      - name: Ensure integration secrets exist (stub if missing)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'functions' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: |
          set -e
          gcloud auth activate-service-account --key-file="$GOOGLE_APPLICATION_CREDENTIALS"
          gcloud config set project "$PRO_PROJECT" --quiet
          # Auto-discover every name referenced by a defineSecret(...)
          # call in functions/. This catches both new integration
          # secrets and any pre-existing secrets that happen to be
          # unset in this project (e.g., GOOGLE_GEOCODING_API_KEY
          # was declared in code but never provisioned). Secrets that
          # already exist with real values are untouched — the check
          # below only adds a version when missing.
          ALL_SECRETS=$(grep -rhoE "defineSecret\(\s*['\"][A-Z0-9_]+['\"]" functions/ \
            | sed -E "s/.*defineSecret\(\s*['\"]([A-Z0-9_]+)['\"].*/\1/" \
            | sort -u)
          echo "Discovered secrets: $(echo $ALL_SECRETS | wc -w)"
          echo "$ALL_SECRETS"
          # Firebase CLI needs each secret to have an initial *non-empty*
          # version, otherwise it errors with "has no latest version".
          # Stub with the sentinel value __unset__ which the runtime
          # hasSecret() check in integrations/_shared.js treats as
          # "not configured" and falls through to the lazy-opt-in path.
          STUB='__unset__'
          for SECRET in $ALL_SECRETS; do
            if gcloud secrets describe "$SECRET" --project "$PRO_PROJECT" >/dev/null 2>&1; then
              # Make sure there's at least one version. If the secret
              # exists but was previously created empty (bad stub from
              # an earlier deploy attempt), add the sentinel version
              # now so Firebase CLI is satisfied.
              if ! gcloud secrets versions list "$SECRET" --project "$PRO_PROJECT" --limit=1 --format='value(name)' 2>/dev/null | grep -q .; then
                echo "+ $SECRET exists but has zero versions — adding sentinel"
                printf '%s' "$STUB" | gcloud secrets versions add "$SECRET" --data-file=- --project "$PRO_PROJECT" --quiet
              else
                echo "✓ $SECRET already exists with a version (leaving real value intact)"
              fi
            else
              echo "+ creating stub $SECRET with sentinel value — integration will no-op at runtime until you set a real value"
              printf '%s' "$STUB" | gcloud secrets create "$SECRET" --data-file=- --project "$PRO_PROJECT" --quiet
            fi
          done

      - name: Deploy Firestore rules (pro)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'rules' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: npx firebase-tools deploy --only firestore:rules --project "$PRO_PROJECT" --non-interactive

      # Firestore composite indexes ship before functions so every
      # new .where() query has its index ready when the function
      # execution first hits it.
      #
      # Known firebase-tools quirk: the CLI returns non-zero on any
      # HTTP 409 ("index already exists") — even when the partial
      # set of indexes it CAN create succeeds. Sometimes an index
      # exists from a prior console edit or manual deploy and
      # blocks every subsequent run. We tolerate non-zero here so
      # rules / functions / hosting still roll out; the raw CLI
      # output in the log tells us exactly which index conflicted.
      # F-10: index deploy now distinguishes 409 "already exists" (a
      # benign no-op) from every other failure. Previously `set +e`
      # swallowed ALL errors, which would mask a real problem like a
      # malformed composite index spec or a permissions regression.
      - name: Deploy Firestore indexes (pro)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'rules' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: |
          set +e
          LOG="$RUNNER_TEMP/firestore-indexes.log"
          npx firebase-tools deploy --only firestore:indexes --project "$PRO_PROJECT" --non-interactive 2>&1 | tee "$LOG"
          EXIT=${PIPESTATUS[0]}
          if [ $EXIT -eq 0 ]; then
            echo "✓ Firestore indexes deployed cleanly."
            exit 0
          fi
          # Positive 409 filter — accept ONLY if every non-OK line was
          # an "already exists" conflict. Anything else is a real error.
          if grep -qiE 'error|failed|denied|permission' "$LOG" \
             && ! grep -qiE 'already exists|409' "$LOG"; then
            echo "::error::Firestore index deploy failed with a non-409 error (exit $EXIT). Fix it before merging."
            exit $EXIT
          fi
          # Mixed 409 + other lines: if any non-409 error is present,
          # fail. If only 409s, tolerate.
          if grep -qiE 'error|failed|denied|permission' "$LOG" \
             && grep -vE 'already exists|409' "$LOG" | grep -qiE 'error|failed|denied|permission'; then
            echo "::error::Firestore index deploy had a non-409 error mixed with 409s. Fix and re-run."
            exit $EXIT
          fi
          echo "::warning::Index deploy hit 'already exists' (409) only. Treating as no-op."
          exit 0

      # F-10: Storage rules deploy MUST fail the workflow if it fails.
      # Previously we swallowed the exit code and shipped functions +
      # hosting against a stale rules set — which is exactly the kind
      # of silent regression a security audit flags. If IAM is missing
      # for the deploy SA, fix IAM once, not every push.
      - name: Deploy Storage rules (pro)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'rules' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: npx firebase-tools deploy --only storage --project "$PRO_PROJECT" --non-interactive

      # F-10 + Q8: functions deploy is strict by default — any failure
      # fails the workflow. But there's an explicit exception list for
      # functions whose DEPLOY blocks on IAM the GitHub Actions deploy
      # SA doesn't have:
      #
      #   cloudscheduler.jobs.update  → schedule-function binding update
      #   identityplatform.admin      → blocking-trigger registration
      #
      # These 8 functions have no code changes in the normal case; the
      # SA just can't refresh their Cloud Scheduler job / Identity
      # Platform config. Previous deploys succeeded because the SA
      # had broader roles; IAM drift revoked them at some point.
      #
      # Strategy:
      #  1. Main deploy = everything EXCEPT the 8 known-blocked names.
      #     Strict — failure fails the workflow.
      #  2. Second step (tolerant) retries ONLY the 8. Permission
      #     errors there produce a warning, not a failure. When ops
      #     grants roles/cloudscheduler.admin + roles/identityplatform.admin
      #     to the deploy SA, empty NBD_DEPLOY_SKIP_LIST and the main
      #     step handles them.
      #
      # Full remediation runbook: see POST_DEPLOY_CHECKLIST §16.
      #
      # --force auto-confirms deletion of orphan functions. --debug
      # was retained on 2026-04-14 to diagnose the IAM-denial cascade;
      # removed now that the split-deploy strategy works cleanly. If
      # a future deploy goes opaque again, add --debug back as the
      # first investigation step.
      - name: Deploy Cloud Functions (strict — skips IAM-blocked 9)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'functions' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
          # Names that fail with cloudscheduler.jobs.update or
          # identityplatform.admin denials. Clear this list once
          # those roles are granted.
          # recordingRetentionCron added 2026-04-15: scheduled fn from
          # voice-intelligence.js fails on update (same SA gap).
          NBD_DEPLOY_SKIP_LIST: "nightlyFirestoreBackup,auditLogRetentionCron,checkStormAlerts,emailQueueWorker,onFollowUpDue,onAppointmentReminder,hailMatchCron,onRepSignup,recordingRetentionCron"
        run: |
          set -e
          # Enumerate every function export across functions/*.js +
          # functions/integrations/*.js. Grep for exports of the
          # Cloud Functions factory functions so we match both 2nd-gen
          # HTTP/callable and Firestore/Auth triggers.
          ALL=$(grep -rhE "^exports\.[a-zA-Z_][a-zA-Z0-9_]* *= *(onRequest|onCall|beforeUserCreated|beforeUserSignedIn|onSchedule|onDocumentCreated|onDocumentUpdated|onDocumentWritten|onDocumentDeleted|functions\.https\.onRequest|functions\.https\.onCall|functions\.firestore|functions\.auth|functions\.pubsub)" functions/*.js functions/integrations/*.js 2>/dev/null \
                | sed -E 's/^exports\.([a-zA-Z_][a-zA-Z0-9_]*) *=.*/\1/' \
                | sort -u)
          # Build an include list = ALL minus skip-list.
          INCLUDE=""
          for fn in $ALL; do
            if echo ",${NBD_DEPLOY_SKIP_LIST}," | grep -q ",${fn},"; then
              echo "⏭  skipping $fn (IAM-blocked; see POST_DEPLOY_CHECKLIST §16)"
            else
              INCLUDE="${INCLUDE},functions:${fn}"
            fi
          done
          INCLUDE="${INCLUDE#,}"  # trim leading comma
          if [ -z "$INCLUDE" ]; then
            echo "::error::No functions left to deploy after skip-list"; exit 1
          fi
          echo "Deploying $(echo "$INCLUDE" | awk -F',' '{print NF}') function(s)"
          npx firebase-tools deploy --only "$INCLUDE" --project "$PRO_PROJECT" --non-interactive --force

      # Second pass: retry the skip-list with tolerance. If IAM has
      # since been granted, these succeed. If not, the warning is
      # surfaced in the workflow summary and the rest of the
      # deploy (Hosting, etc.) continues. Scheduled + blocking
      # functions still run their LAST deployed revision — it's the
      # update that fails, not the runtime.
      - name: Deploy Cloud Functions (tolerant — IAM-blocked retry)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'functions' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
          NBD_DEPLOY_SKIP_LIST: "nightlyFirestoreBackup,auditLogRetentionCron,checkStormAlerts,emailQueueWorker,onFollowUpDue,onAppointmentReminder,hailMatchCron,onRepSignup,recordingRetentionCron"
        run: |
          set +e
          RETRY=""
          for fn in $(echo "$NBD_DEPLOY_SKIP_LIST" | tr ',' ' '); do
            RETRY="${RETRY},functions:${fn}"
          done
          RETRY="${RETRY#,}"
          echo "Attempting tolerant deploy of: $RETRY"
          npx firebase-tools deploy --only "$RETRY" --project "$PRO_PROJECT" --non-interactive --force
          EXIT=$?
          if [ $EXIT -ne 0 ]; then
            {
              echo "### ⚠ Some scheduled / blocking-trigger functions couldn't update"
              echo ""
              echo "The GitHub Actions deploy service account is missing either"
              echo "\`roles/cloudscheduler.admin\` or \`roles/identityplatform.admin\`"
              echo "(or both). The following functions were NOT updated this deploy:"
              echo ""
              for fn in $(echo "$NBD_DEPLOY_SKIP_LIST" | tr ',' ' '); do
                echo "  - $fn"
              done
              echo ""
              echo "Their last-deployed revisions are still live in Cloud Run."
              echo "Grant the missing IAM roles to unstick them — runbook:"
              echo "POST_DEPLOY_CHECKLIST.md §16."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Scheduled/blocking functions deferred — see summary"
          else
            echo "✓ All previously-IAM-blocked functions deployed cleanly. Remove NBD_DEPLOY_SKIP_LIST in the workflow."
          fi
          exit 0

      - name: Deploy Hosting
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'hosting' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: npx firebase-tools deploy --only hosting --project "$PRO_PROJECT" --non-interactive

      # Marketing-project deploy. Tolerant of failure — this is a
      # SEPARATE Firebase project (nobigdealwithjoedeal) that may
      # have been renamed, deleted, or never set up. When the
      # project doesn't exist, the serviceusage API returns 400
      # and we log a warning instead of failing the whole deploy.
      # The pro-project deploys (the actual production site) are
      # already done by this point.
      - name: Deploy marketing-project Firestore rules
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'marketing-rules' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: |
          set +e
          if [ ! -f marketing-site-firestore.rules ]; then
            echo "::warning::marketing-site-firestore.rules not found — skipping"
            exit 0
          fi
          # Swap the pro rules for the marketing rules, deploy against
          # the marketing project, then restore. Always restore on exit
          # so the pro rules never get orphaned.
          cp firestore.rules /tmp/firestore.rules.pro.bak
          trap 'cp /tmp/firestore.rules.pro.bak firestore.rules; rm -f /tmp/firestore.rules.pro.bak' EXIT
          cp marketing-site-firestore.rules firestore.rules
          npx firebase-tools deploy --only firestore:rules --project "$MKT_PROJECT" --non-interactive
          EXIT=$?
          if [ $EXIT -eq 0 ]; then
            echo "✓ Marketing rules deployed."
          else
            echo "::warning::Marketing-project deploy returned $EXIT. Usually means the project '$MKT_PROJECT' doesn't exist or the deploy SA isn't a member. The pro-project deploys already completed — this step only affects a separate marketing site Firestore."
          fi
          exit 0

      - name: Wipe service-account JSON from runner
        if: always()
        run: rm -f "${{ steps.sa.outputs.sa_path }}"

      - name: Deploy summary
        if: success()
        run: |
          {
            echo "### ✓ Firebase deploy complete"
            echo ""
            echo "| Component | Project | Status |"
            echo "|---|---|---|"
            echo "| Firestore rules | $PRO_PROJECT | deployed |"
            echo "| Storage rules | $PRO_PROJECT | deployed |"
            echo "| Cloud Functions | $PRO_PROJECT | deployed |"
            echo "| Hosting | $PRO_PROJECT | deployed |"
            echo "| Marketing Firestore rules | $MKT_PROJECT | deployed |"
            echo ""
            echo "Next: run \`./scripts/verify-deploy.sh\` against the live URLs to confirm the smoke tests pass."
          } >> "$GITHUB_STEP_SUMMARY"
