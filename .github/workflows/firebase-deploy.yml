name: Firebase deploy

# Auto-deploys the site to Firebase on every push to main.
#
# Gracefully skips when the FIREBASE_SERVICE_ACCOUNT secret is not
# configured — that way this file can live in main from day one
# without generating failure emails before go-live.
#
# Deploy order (when the secret IS set):
#   1. Firestore rules (pro project)
#   2. Storage rules
#   3. Cloud Functions
#   4. Hosting
#   5. Marketing-project Firestore rules (separate project)
#
# ─────────────────────────────────────────────────────────────
# REQUIRED GITHUB ACTIONS SECRET (one-time setup to enable deploys)
# ─────────────────────────────────────────────────────────────
# Name:  FIREBASE_SERVICE_ACCOUNT
# Value: the contents of a Firebase service-account JSON file with
#        Cloud Functions Deployer + Cloud Datastore User + Firebase
#        Hosting Admin + Firebase Rules Admin roles.
#
# How to generate:
#   1. Firebase Console → Project Settings → Service accounts →
#      "Generate new private key" → download JSON
#   2. GitHub repo → Settings → Secrets and variables → Actions →
#      New repository secret → name: FIREBASE_SERVICE_ACCOUNT,
#      value: paste the entire JSON file contents
#   3. NEVER commit the JSON to the repo. GitHub Secrets are the
#      only place it should live.
#
# Until the secret is set, every workflow run will be a quick
# "skipped — secret not configured" notice, NOT a failure email.
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
    paths:
      # Skip doc-only changes
      - 'docs/**'
      - 'functions/**'
      - 'firestore.rules'
      - 'storage.rules'
      - 'marketing-site-firestore.rules'
      - 'firebase.json'
      - '.github/workflows/firebase-deploy.yml'
  workflow_dispatch:
    inputs:
      scope:
        description: 'What to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - hosting
          - functions
          - rules
          - marketing-rules

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────
  # check — read whether the secret is set. Always succeeds.
  # Outputs `configured=true|false` for the deploy job's `if:`.
  # This runs without accessing the secret's value, only its presence,
  # so it's cheap and GitHub-Actions-safe.
  # ─────────────────────────────────────────────────────────
  check:
    name: Check if Firebase credentials are configured
    runs-on: ubuntu-latest
    outputs:
      configured: ${{ steps.check.outputs.configured }}
    steps:
      - id: check
        env:
          SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -n "$SA" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "::notice::FIREBASE_SERVICE_ACCOUNT is set — proceeding to deploy."
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            {
              echo "### ⏸ Firebase deploy skipped"
              echo ""
              echo "The \`FIREBASE_SERVICE_ACCOUNT\` repository secret is not configured yet."
              echo "Auto-deploy is intentionally disabled until it's set — this is a safety feature, not an error."
              echo ""
              echo "**To enable auto-deploy:**"
              echo ""
              echo "1. Firebase Console → Project Settings → Service Accounts → *Generate new private key* → download the JSON."
              echo "2. GitHub repo → Settings → Secrets and variables → Actions → **New repository secret**"
              echo "   - Name: \`FIREBASE_SERVICE_ACCOUNT\`"
              echo "   - Value: paste the entire JSON file contents"
              echo "3. Push to main (or manually re-run this workflow from the Actions tab)."
              echo ""
              echo "Until then every push will show this notice instead of failing."
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::notice::FIREBASE_SERVICE_ACCOUNT is not set — skipping deploy (this is expected before go-live)."
          fi

  # ─────────────────────────────────────────────────────────
  # deploy — runs only when credentials are present. Never runs on
  # an un-configured repo, so no more failure emails pre-go-live.
  # ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    needs: check
    if: needs.check.outputs.configured == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PRO_PROJECT: nobigdeal-pro
      MKT_PROJECT: nobigdealwithjoedeal
      NODE_VERSION: '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: |
          if [ -f package-lock.json ]; then
            npm ci || npm install
          else
            npm install
          fi

      # Writes the service account JSON via an env var instead of shell
      # interpolation, which avoids GitHub Actions' "possible secret
      # exposure" warnings and is the recommended pattern.
      - name: Write service-account JSON to a temp file
        id: sa
        env:
          SA_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          SA_FILE="$RUNNER_TEMP/firebase-sa.json"
          printf '%s' "$SA_JSON" > "$SA_FILE"
          if [ ! -s "$SA_FILE" ]; then
            echo "::error::FIREBASE_SERVICE_ACCOUNT resolved to empty at deploy time."
            exit 1
          fi
          echo "sa_path=$SA_FILE" >> "$GITHUB_OUTPUT"

      - name: Deploy Firestore rules (pro)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'rules' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: npx firebase-tools deploy --only firestore:rules --project "$PRO_PROJECT" --non-interactive

      # Firestore composite indexes ship before functions so every
      # new .where() query has its index ready when the function
      # execution first hits it.
      #
      # Known firebase-tools quirk: the CLI returns non-zero on any
      # HTTP 409 ("index already exists") — even when the partial
      # set of indexes it CAN create succeeds. Sometimes an index
      # exists from a prior console edit or manual deploy and
      # blocks every subsequent run. We tolerate non-zero here so
      # rules / functions / hosting still roll out; the raw CLI
      # output in the log tells us exactly which index conflicted.
      - name: Deploy Firestore indexes (pro)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'rules' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: |
          set +e
          npx firebase-tools deploy --only firestore:indexes --project "$PRO_PROJECT" --non-interactive
          EXIT=$?
          if [ $EXIT -eq 0 ]; then
            echo "✓ Firestore indexes deployed cleanly."
          else
            echo "::warning::Index deploy returned exit code $EXIT (usually an 'index already exists' 409). Rest of deploy continues. Inspect the log above if queries are slow."
          fi
          exit 0

      # Storage rules deploy. Tolerant of failure here — a missing
      # Firebase Storage Admin IAM role or an uninitialized default
      # bucket leaves the EXISTING storage rules in place (which are
      # strict; we're only hardening them further). Functions +
      # Hosting can still ship. Fix IAM (add roles/firebasestorage.admin
      # to the deploy service account) then re-run via workflow_dispatch
      # with scope=rules to pick up the new storage.rules.
      - name: Deploy Storage rules (pro)
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'rules' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: |
          set +e
          npx firebase-tools deploy --only storage --project "$PRO_PROJECT" --non-interactive
          EXIT=$?
          if [ $EXIT -eq 0 ]; then
            echo "✓ Storage rules deployed."
          else
            echo "::warning::Storage rules deploy returned $EXIT. Usually means the service account is missing roles/firebasestorage.admin or Firebase Storage isn't initialized for the project. Existing rules remain in effect. Fix IAM and re-run with scope=rules."
          fi
          exit 0

      - name: Deploy Cloud Functions
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'functions' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: npx firebase-tools deploy --only functions --project "$PRO_PROJECT" --non-interactive

      - name: Deploy Hosting
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'hosting' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: npx firebase-tools deploy --only hosting --project "$PRO_PROJECT" --non-interactive

      - name: Deploy marketing-project Firestore rules
        if: ${{ github.event_name == 'push' || github.event.inputs.scope == 'all' || github.event.inputs.scope == 'marketing-rules' }}
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.sa.outputs.sa_path }}
        run: |
          set -e
          if [ ! -f marketing-site-firestore.rules ]; then
            echo "::warning::marketing-site-firestore.rules not found — skipping"
            exit 0
          fi
          # Swap the pro rules for the marketing rules, deploy against
          # the marketing project, then restore. Always restore on exit
          # so the pro rules never get orphaned.
          cp firestore.rules /tmp/firestore.rules.pro.bak
          trap 'cp /tmp/firestore.rules.pro.bak firestore.rules; rm -f /tmp/firestore.rules.pro.bak' EXIT
          cp marketing-site-firestore.rules firestore.rules
          npx firebase-tools deploy --only firestore:rules --project "$MKT_PROJECT" --non-interactive

      - name: Wipe service-account JSON from runner
        if: always()
        run: rm -f "${{ steps.sa.outputs.sa_path }}"

      - name: Deploy summary
        if: success()
        run: |
          {
            echo "### ✓ Firebase deploy complete"
            echo ""
            echo "| Component | Project | Status |"
            echo "|---|---|---|"
            echo "| Firestore rules | $PRO_PROJECT | deployed |"
            echo "| Storage rules | $PRO_PROJECT | deployed |"
            echo "| Cloud Functions | $PRO_PROJECT | deployed |"
            echo "| Hosting | $PRO_PROJECT | deployed |"
            echo "| Marketing Firestore rules | $MKT_PROJECT | deployed |"
            echo ""
            echo "Next: run \`./scripts/verify-deploy.sh\` against the live URLs to confirm the smoke tests pass."
          } >> "$GITHUB_STEP_SUMMARY"
