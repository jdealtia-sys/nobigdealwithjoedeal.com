<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Joe AI | NBD Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Barlow:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    :root {
      --bg: #0a0c0f;
      --s: #13151a;
      --s2: #1a1d24;
      --s3: #21252e;
      --br: #2a2f3a;
      --t: #e5e7eb;
      --m: #9ca3af;
      --orange: #c8541a;
      --og: rgba(200,84,26,0.1);
    }
    
    body {
      font-family: 'Barlow', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--t);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* HEADER */
    header {
      background: rgba(10,12,15,.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--br);
      padding: 0 20px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    
    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--t);
    }
    
    .logo span {
      color: var(--orange);
      font-weight: 400;
    }
    
    .back-btn {
      background: var(--s2);
      border: 1px solid var(--br);
      color: var(--t);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all .15s;
    }
    
    .back-btn:hover {
      background: var(--s3);
      border-color: var(--orange);
    }
    
    /* CHAT CONTAINER */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      width: 100%;
      margin: 0 auto;
      padding: 20px;
      overflow: hidden;
    }
    
    /* MESSAGES */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .message {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.3s ease;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
      flex-direction: row-reverse;
    }
    
    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--orange);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      flex-shrink: 0;
    }
    
    .message.user .avatar {
      background: var(--s3);
    }
    
    .bubble {
      background: var(--s2);
      border: 1px solid var(--br);
      border-radius: 12px;
      padding: 12px 16px;
      max-width: 70%;
      line-height: 1.6;
      font-size: 14px;
    }
    
    .message.user .bubble {
      background: var(--og);
      border-color: var(--orange);
    }
    
    .bubble code {
      background: var(--s);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }
    
    /* TYPING INDICATOR */
    .typing {
      display: none;
      gap: 4px;
      padding: 8px 12px;
    }
    
    .typing.active {
      display: flex;
    }
    
    .typing span {
      width: 8px;
      height: 8px;
      background: var(--m);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }
    
    .typing span:nth-child(1) { animation-delay: -0.32s; }
    .typing span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    /* INPUT AREA */
    .input-area {
      border-top: 1px solid var(--br);
      padding: 20px 0 0;
      flex-shrink: 0;
    }
    
    .input-box {
      display: flex;
      gap: 12px;
      background: var(--s2);
      border: 1px solid var(--br);
      border-radius: 12px;
      padding: 12px;
      transition: border-color .15s;
    }
    
    .input-box:focus-within {
      border-color: var(--orange);
    }
    
    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--t);
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
    }
    
    #userInput::placeholder {
      color: var(--m);
    }
    
    #sendBtn {
      background: var(--orange);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }
    
    #sendBtn:hover:not(:disabled) {
      background: #d65e20;
      transform: scale(1.05);
    }
    
    #sendBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* WELCOME MESSAGE */
    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: var(--m);
    }
    
    .welcome-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    
    .welcome h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 24px;
      color: var(--t);
      margin-bottom: 8px;
    }
    
    .welcome p {
      font-size: 14px;
      line-height: 1.6;
    }
    
    /* MOBILE */
    @media (max-width: 768px) {
      .chat-container {
        padding: 12px;
      }
      
      .bubble {
        max-width: 85%;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Ask <span>Joe</span> AI</div>
  <button class="back-btn" onclick="window.location.href='/pro/dashboard.html'">← Back to Dashboard</button>
</header>

<div class="chat-container">
  <div class="messages" id="messages">
    <div class="welcome">
      <div class="welcome-icon">🤖</div>
      <h2>Hey! I'm Joe AI</h2>
      <p>Ask me anything about contracting, insurance restoration, Xactimate, or NBD Pro features.<br>I'm here to help!</p>
    </div>
  </div>
  
  <div class="input-area">
    <div class="input-box">
      <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTrotINzl2YjdGbH25BpC-FPv8i_fXNvg",
  authDomain: "nobigdeal-pro.firebaseapp.com",
  projectId: "nobigdeal-pro",
  storageBucket: "nobigdeal-pro.firebasestorage.app",
  messagingSenderId: "717435841570",
  appId: "1:717435841570:web:c2338e11052c96fde02e7b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Auth check
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = '/pro/index.html';
  }
});

window.auth = auth;
</script>

<script>
const messagesDiv = document.getElementById('messages');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');

// Auto-resize textarea
userInput.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = this.scrollHeight + 'px';
});

// Send on Enter (Shift+Enter for new line)
userInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function sendMessage() {
  const message = userInput.value.trim();
  if (!message) return;
  
  // Clear input
  userInput.value = '';
  userInput.style.height = 'auto';
  
  // Remove welcome message if present
  const welcome = messagesDiv.querySelector('.welcome');
  if (welcome) welcome.remove();
  
  // Add user message
  addMessage(message, 'user');
  
  // Show typing indicator
  const typingDiv = addTypingIndicator();
  
  // Disable send button
  sendBtn.disabled = true;
  
  try {
    // Get Anthropic API key from localStorage (same key saved by dashboard settings)
    const _apiKey = localStorage.getItem('nbd_joe_key') || '';
    if (!_apiKey || !_apiKey.startsWith('sk-ant')) {
      typingDiv.remove();
      addMessage('⚙️ To use Joe AI, add your Anthropic API key in the CRM Dashboard → Settings → Ask Joe AI tab. Get a free key at console.anthropic.com.', 'ai');
      sendBtn.disabled = false;
      return;
    }

    const _systemPrompt = 'You are Joe Deal, owner of No Big Deal Home Solutions in Greater Cincinnati — a battle-tested insurance restoration contractor with 7+ years of experience. You help with roofing, siding, gutters, storm damage claims, Xactimate estimates, adjuster negotiations, and contractor business strategy. You are direct, actionable, and field-tested. You never recommend dishonest practices. Keep responses concise and practical.';

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-allow-browser': 'true',
        'x-api-key': _apiKey
      },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 1024,
        system: _systemPrompt,
        messages: [{ role: 'user', content: message }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({ error: { message: 'API error' } }));
      throw new Error(err?.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    
    // Remove typing indicator
    typingDiv.remove();
    
    // Add AI response
    const _rt = data?.content?.[0]?.text;
    if (_rt) {
      addMessage(_rt, 'ai');
    } else {
      addMessage('Sorry, I encountered an error. Please try again.', 'ai');
    }
    
  } catch (error) {
    console.error('Error:', error);
    typingDiv.remove();
    addMessage('Oops! Something went wrong. Please try again.', 'ai');
  }
  
  // Re-enable send button
  sendBtn.disabled = false;
  userInput.focus();
}

function addMessage(text, type) {
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${type}`;
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = type === 'user' ? 'U' : '🤖';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  
  messageDiv.appendChild(avatar);
  messageDiv.appendChild(bubble);
  messagesDiv.appendChild(messageDiv);
  
  // Scroll to bottom
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  
  return messageDiv;
}

function addTypingIndicator() {
  const typingDiv = document.createElement('div');
  typingDiv.className = 'message ai';
  typingDiv.innerHTML = `
    <div class="avatar">🤖</div>
    <div class="bubble">
      <div class="typing active">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  `;
  messagesDiv.appendChild(typingDiv);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
  return typingDiv;
}

// Expose for onclick
window.sendMessage = sendMessage;
</script>

</body>
</html>
