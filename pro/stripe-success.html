<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to NBD Pro — Payment Successful</title>
<style>
:root {
  --navy: #1a2b5e;
  --navy-dark: #0f1d42;
  --orange: #e8720c;
  --white: #fff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Montserrat', sans-serif;
  background: var(--navy-dark);
  color: var(--white);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.container {
  max-width: 520px;
  background: rgba(22, 27, 34, 0.95);
  border: 1px solid rgba(232, 114, 12, 0.2);
  border-radius: 12px;
  padding: 48px 40px;
  text-align: center;
}
.success-icon {
  width: 80px;
  height: 80px;
  background: rgba(232, 114, 12, 0.15);
  border: 2px solid var(--orange);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 28px;
  font-size: 42px;
}
h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  letter-spacing: 1px;
  margin-bottom: 16px;
  color: var(--orange);
}
.message {
  color: #c8d3e0;
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 32px;
}
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 16px;
  background: rgba(232, 114, 12, 0.08);
  border: 1px solid rgba(232, 114, 12, 0.2);
  border-radius: 8px;
  margin-bottom: 24px;
  font-size: 13px;
  color: var(--orange);
}
.spinner {
  width: 20px;
  height: 20px;
  border: 2px solid rgba(232, 114, 12, 0.2);
  border-top-color: var(--orange);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.btn {
  display: inline-block;
  background: var(--orange);
  color: var(--white);
  padding: 15px 36px;
  border-radius: 6px;
  font-weight: 700;
  font-size: 13px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  text-decoration: none;
  transition: all 0.25s;
}
.btn:hover {
  background: #c45e08;
  transform: translateY(-1px);
}
.error {
  background: rgba(224, 82, 82, 0.1);
  border: 1px solid rgba(224, 82, 82, 0.3);
  color: #e05252;
  padding: 16px;
  border-radius: 8px;
  margin-bottom: 24px;
  font-size: 13px;
}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">
  <div class="success-icon">✓</div>
  <h1>Payment Successful!</h1>
  <p class="message">Thank you for subscribing to NBD Pro. We're setting up your account now...</p>
  
  <div id="status" class="loading">
    <div class="spinner"></div>
    <span>Activating your subscription</span>
  </div>
  
  <div id="error" class="error" style="display:none"></div>
  
  <a href="/pro/dashboard.html" id="dashboardBtn" class="btn" style="display:none">Go to Dashboard →</a>
</div>

<!-- Firebase -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js';
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js';

// Firebase config (same as dashboard.html)
const firebaseConfig = {
  apiKey: "AIzaSyBtWB6f3_qOdqVgHKccj9VYJ9OEkSJ7Yls",
  authDomain: "no-big-deal-home-solutions.firebaseapp.com",
  projectId: "no-big-deal-home-solutions",
  storageBucket: "no-big-deal-home-solutions.firebasestorage.app",
  messagingSenderId: "695266440054",
  appId: "1:695266440054:web:e6d6db1e8f1e2f3a8b0c9d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Get session ID from URL
const urlParams = new URLSearchParams(window.location.search);
const sessionId = urlParams.get('session_id');

if (!sessionId) {
  showError('No session ID found. Please contact support.');
}

// Check if user is already signed in
onAuthStateChanged(auth, async (user) => {
  if (user) {
    // User already has account - activate subscription
    await activateSubscription(user);
  } else {
    // New user - need to create account
    // Fetch session details from Stripe to get email
    await fetchSessionAndCreateAccount();
  }
});

async function fetchSessionAndCreateAccount() {
  try {
    // Call your backend to get session details
    // This requires a backend endpoint that uses Stripe secret key
    
    // For MVP: prompt user for email/password
    // In production: fetch from Stripe session
    
    const email = prompt('Please enter your email address:');
    const password = generateSecurePassword();
    
    if (!email) {
      showError('Email is required');
      return;
    }
    
    updateStatus('Creating your account...');
    
    // Create Firebase account
    const credential = await createUserWithEmailAndPassword(auth, email, password);
    
    // Save password info for user
    alert(`Your account has been created!\n\nEmail: ${email}\nPassword: ${password}\n\nPlease save this information!`);
    
    await activateSubscription(credential.user);
    
  } catch (error) {
    console.error('Account creation error:', error);
    
    if (error.code === 'auth/email-already-in-use') {
      // Account exists - prompt for password
      const email = prompt('Account exists. Enter your email:');
      const password = prompt('Enter your password:');
      
      try {
        const credential = await signInWithEmailAndPassword(auth, email, password);
        await activateSubscription(credential.user);
      } catch (e) {
        showError('Login failed: ' + e.message);
      }
    } else {
      showError(error.message);
    }
  }
}

async function activateSubscription(user) {
  try {
    updateStatus('Activating your subscription...');
    
    // Get session details to determine plan
    const plan = urlParams.get('plan') || 'professional'; // Fallback
    
    // Write subscription to Firestore
    // Path matches dashboard.html subscription check (subscriptions/{uid})
    await setDoc(doc(db, 'subscriptions', user.uid), {
      plan: plan,
      status: 'active',
      stripeSessionId: sessionId,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    });
    
    updateStatus('Subscription activated!');
    
    // Show success
    setTimeout(() => {
      document.getElementById('status').style.display = 'none';
      document.getElementById('dashboardBtn').style.display = 'inline-block';
    }, 1000);
    
  } catch (error) {
    console.error('Subscription activation error:', error);
    showError('Failed to activate subscription: ' + error.message);
  }
}

function updateStatus(message) {
  const status = document.getElementById('status');
  status.querySelector('span').textContent = message;
}

function showError(message) {
  const errorDiv = document.getElementById('error');
  errorDiv.textContent = message;
  errorDiv.style.display = 'block';
  document.getElementById('status').style.display = 'none';
}

function generateSecurePassword() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789!@#$%';
  let password = '';
  for (let i = 0; i < 12; i++) {
    password += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return password;
}

</script>

</body>
</html>
